front:
  text: 欒城應詔集第一卷
  hash: sha256:cfbd5782f2236e7733147d45dbe8afe4ef157eb2347ba38fe0e5940c41c22cda
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0083_SBCK_001-1a}
body:
  text: 進論五首夏論聖人之道茍可以安於天下不求夫爲異也堯舜傳之賢而禹傳之子天下以爲禹無聖人而傳之而後授之其子孫也夫聖人之於天下不從其所安而爲之而求異夫天下之人何其用心之淺邪昔者湯有伊尹武王有周公而周公文王之子武王之弟也湯之太甲武之成王皆可以爲天下而湯不以與其臣武王不以與其弟誠以爲其子之才不至於亂天下者則無事乎授之他人而以爲異也而天下之人何獨疑夫禹哉今夫人之愛其子是天下之通義也有得焉而思以與其子孫人情之所皆然也聖人以是爲不可易故從而聽之使之父子相繼而無相亂以至於堯堯舉其天下而授之舜舜得堯之天下而又授之禹舉天下而授之人此聖人之所以大過人而天下後世之所不能也天下後世之所不能而聖人獨爲之豈以爲異哉夫天下之人不能皆賢而有異人焉爲異而震之則天下皆將喜其名而失其眞故夫堯舜之傳賢者是不得巳而然也使堯之丹朱舜之商均僅可以守天下而堯肯傳之舜而舜肯傳之禹以爲異而疑天下哉然則禹之不以天下授益非以益爲不足授也使天下復有禹而愚知禹不以天下授之矣何者啓足以爲天下故也啓爲天下而益爲之佐是益不失爲伊尹周公而其功猶可以及天下也蓋聖人之不喜異也如此昔者嘗聞之魯人之法贖人者受金於府子貢贖人而不受賞夫子嘆曰嗟夫使魯之不復贖人者賜也夫贖人而不以爲功此君子之所以異於衆人者而其弊乃至於不贖是故聖人不喜爲異以其有時而窮也閔子終三年之喪見於夫子援琴而歌戚戚而不樂子夏取琴而鼔之其樂衎衎然作而曰先王制禮不敢不及也而夫子皆以爲賢由此觀之聖人之行豈求勝失天下之人哉亦有所守而已矣商論商之有天下者三十世而周之世三十有七商之旣衰而復興者五王而周之旣衰而復興者宣王一人而巳蓋商之多賢君宜若其世之過於周而反不如周之賢君不如商之多而其久於商者乃數百歲也此二者所以使天下之人疑焉而不知其故也蓋常以爲周公之治天下務爲文章繁縟之禮以和柔馴擾天下剛强之民故其道本於尊尊而親親貴老而慈幼使民之父子相愛而兄弟相恱以無犯上難制之氣行其至柔之道以揉天下之戾心而去其剛毅勇果之政故其享天下至久而諸侯內侵京師不振卒於廢爲至弱之國何者優柔和易之道可以爲久而不可以爲强也若夫商人所以爲天下者不可復見矣竊常求之於詩書之間見夫詩之寛緩而和柔書之委曲而繁重者舉皆周也而商人之詩駿發而嚴厲其書簡潔而明肅以爲商人之風俗蓋在乎此矣夫惟天下之有剛强不屈之俗也故其後世有以自振於衰微然至於其敗也一散而不可復止故夫物之强者易以折而柔忍者可以久存柔者可以久存而常困於不勝强者易以折而其末也乃可以有所立且此非聖人之罪也物莫不有所短方其盛也長用而短伏及其衰也長伏而短見夫聖人惟能就其所長而用之也是故當其盛時天下惟其長之知而不知其短之所在及其後世用之不當其長日巳消亡而短日出故夫能久者常不能强能以自奮者常不能久此商之所以不長而周之所以不振也嗚乎聖人之慮天下亦有所就而已蓋不能使之無弊也使之能久而不能强能以自奮而不能以及遠此二者存乎其後世之賢與不賢也故太公封於齊尊賢而尚功周公曰後世必有簒奪之臣周公治魯親親而尊尊太公曰後世寖衰矣夫尊賢尚功則近於强親親尊尊則近於弱終於齊有田氏之禍而魯人困於盟主之令蓋商之政近於齊而周公之所以治周者其所以治魯也故齊强而魯弱魯未亡而齊亡也周論傳曰夏之政尚忠商之政尚質周之政尚文而仲尼亦云周監於二代郁郁乎文哉吾從周愚讀詩書歷觀唐虞至於商周蓋嘗以爲自生民以來天下未嘗一日而不趨於文也文之爲言猶曰萬物各得其理云爾父子君臣之間兄弟夫婦之際此文之所由起也昔者生民之初父子無義君臣無禮兄弟不相愛夫婦不相保天下紛然而淆亂忿鬭而相苦文理不著而人倫不明生不相養死不相葬天下之人舉皆戚然有所不寧於其心然後反而求其所安屬其父子而列其君臣聯其兄弟而正其夫婦至於虞夏之世乃益去其鄙野之制然猶以天子之尊而飯土塯啜土鉶土堦三尺茆茨而不剪至於周而後大備其粗始於父子之際而其精布於天下其用甚廣而無窮蓋其當時莫不自以爲文於前世而其後之人乃更以爲質也是故祭祀之禮陳其籩豆列其鼎爼備其醪醴俯伏以薦思其飲食醉飽之樂而不可見也於是灌用鬱鬯藉用白茆旣沃而莫之見以爲神之縮之也體魄降於地魂氣升於天怳忽誕謾而不知其所由處聲音氣臭之類恐不能得當也於是終祭於屋漏繹祭於祊以爲人子之心無所不至也薦之以滋味重之以膾炙恐鬼神之不屑也薦之以血毛重之以體薦恐父祖之不吾安也於是先黍稷而後稻粱先太羹而後庶羞以爲不敢忘禮亦不敢忘愛也丁寧反覆優游而不忍去以爲可以盡人子之心而人子之心亦可以少安矣故凡世之所謂文者皆所以安夫人之所不安而人之所安者事之所當然也仲尼區區於衰周之末收先王之遺文而與曾子推論禮之所難處至於毫釐纖悉之際蓋以爲王道之盛其文理當極於此焉耳及周之亡天下大壞强凌弱衆暴寡而後世乃以爲用文之弊夫自唐虞以至於商漸而入於文至於周而文極於天下當唐虞夏商之世蓋將求周之文而其勢有所未至非有所謂質與忠也自周而下天下習於文非文則無以安天下之所不足此其勢然也今夫冠㛰喪葬而不爲之禮墓祭而不廟室祭而無所仁人君子有所不安於其中而曰不文以從唐虞夏商之質夫唐虞夏商之質蓋將以求周之文而未至者非所以爲法也六國論愚讀六國世家竊恠天下之諸侯以五倍之地十倍之衆發憤西向以攻山西千里之秦而不免於滅亡常爲之深思遠慮以爲必有可以自安之計蓋未嘗不咎其當時之士慮患之疎而見利之淺且不知天下之勢也夫秦之所與諸侯爭天下者不在齊楚燕趙也而在韓魏秦之有韓魏譬如人之有腹心之疾也韓魏塞秦之衝而蔽山東之諸侯故夫天下之所重者莫如韓魏也昔者范雎用於秦而収韓商鞅用於秦而収魏昭王未得韓魏之心而出兵以攻齊之剛夀而范雎以爲憂然則秦之所忌者可以見矣秦之用兵於燕趙秦之危事也越韓過魏而攻人之國都燕趙拒之於前而韓魏乘之於後此危道也而秦之攻燕趙未嘗有韓魏之憂則韓魏之附秦故也夫韓魏諸侯之障而使秦人得出入於其間此豈知天下之勢邪委區區之韓魏以當强虎狼之秦彼安得不折而入於秦哉韓魏折而入於秦然後秦人得通其兵於東諸侯而使天下遍受其禍夫韓魏不能獨當秦而天下之諸侯藉之以蔽其西故莫如厚韓親魏以擯秦秦人不敢逾韓魏以窺齊楚燕趙之國而齊楚燕趙之國因得以自安於其間矣以四無事之國佐當宼之韓魏使韓魏無東顧之憂而爲天下出身以當秦兵以二國委秦而四國休息於內以隂助其急若此可以應夫無窮彼秦者將何爲哉不知出此而乃貪疆埸尺寸之利背盟敗約以自相屠滅秦兵未出而天下諸侯巳自困矣至使秦人得間其隙以取其國可不悲哉秦論秦人居諸侯之地而有萬乘之志㑴辱六國斬伐天下不數十年之間而得志於海內至其後世再傳而遂亡劉季起於匹夫斬艾豪傑蹷秦誅楚以有天下而其傳子孫數十世而不絕蓋秦漢之事其所以起者不同而其所以取之者無以相遠也然劉項奮臂於閭閻之中率天下蜂起之兵西嚮以攻秦無一成之聚一夫之衆驅罷弊適戍之人以求所非望得之則生失之則死以匹夫而圖天下其勢不得不疾戰以趨利是以冒萬死求一生而不顧今秦擁千里之地而棄累世之業雖閉關而守之畜威養兵拊循士民而諸侯誰敢謀秦觀天下之釁而後出兵以乘其弊天下夫誰敢抗而惠文武昭之君乃以萬乘之資而用匹夫所以圖天下之勢疾戰而不顧其後此宜其能以取天下而亦能以亡之也夫劉項之勢天下皆非吾有起於草莽之中因亂而爭之故雖馳天下之人以爭一旦之命而民猶有待於戡定以息肩於此故以疾戰定天下天下旣安而下無背叛之志若夫六國之際諸侯各有分地而秦乃欲以力征彊服四海不愛先王之遺黎第爲子孫之謀而竭其力以爭隣國之利六國雖滅而秦民之心巳散矣故秦之所以謀天下者匹夫特起之勢而非所以承祖宗之業以求其不失者也昔者嘗聞之周人之興數百年而後至於文武文武之際三分天下而有其二然商之諸侯猶有所未服紂之衆未可以不擊而自解也故以文武之賢退而脩德以待其自潰誠以爲后稷公劉太王工季勤勞不懈而後能至於此故其發之不可輕而用之有時也嗟夫秦人舉累世之資一用而不復惜其先王之澤巳竭於取天下而尚欲求以爲國亦已惑矣欒城應詔集第一卷終
