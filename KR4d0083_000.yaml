body:
  text: 第一卷進論五首夏商周六國秦第二卷進論五首漢三國晉七代隋第三卷進論五首唐五代周公老聃上老聃下第四卷進論五首禮易書詩春秋第五卷進論五首燕趙蜀北狄西戎西南夷第六卷進策君術五道第七卷進策臣事五道上第八卷進策臣事五道下第九卷進策民政五道上第十卷進策民政五道下第十一卷秘閣試論六首王者不治夷狄劉愷丁鴻孰賢禮義信足以成德形勢不如德禮以養人爲本旣醉備五福秋試論一首史官助賞罰省試論一首刑賞忠厚之至第十二卷御試制科策一道欒城應詔集目錄終
