body:
  text: 進策五道臣事第一道臣聞天下有權臣有重臣二者其迹相近而難明天下之人知惡夫權臣之為而世之重臣亦遂不容於其間夫權臣者天下不可一日而有而重臣者天下不可一日而無也天下徒見其外而不察其中見其皆侵天子之權而不察其所為之不類是以舉皆嫉之而無所喜此亦已太過也今夫權臣之所為者重臣之所切齒而重臣之所取者權臣之所不顧也將為權臣邪必將內恱其君之心委曲聽順而無所違戾外竊其生殺豫奪之柄黜陟天下以見己之權而沒其君之威惠內能使其君歡愛恱懌無所不順而安為之上外能使其公卿大夫百官庶吏無所歸命而爭為之腹心上愛下順合而為一然後權臣之勢遂成而不可拔至於重臣則不然君有所為不可以必爭爭之不能而其事有所必不可聽則專行而不顧待其成敗之迹著則其上之心將繹然而自解其在朝廷之中天子為之踧然而有所畏士大夫不敢安肆怠惰於其側爵祿慶賞己得以議其可否而不求以為己之私惠刀鋸斧鉞己得以參其輕重而不求以為己之私勢要以使天子有所不可必為而羣下有所畏懼而己不與其利何者為重臣者不待天下之歸已而為權臣者亦無所事天子之畏己也故各因其行事而觀其意之所在則天下誰可欺者臣故曰為天下安可一日而無重臣也且今使天下而無重臣則朝廷之事惟天子之所為而無所可否雖使天子有納諫之明而百官畏懼戰栗無平昔尊重之勢誰肯觸忌諱冒罪戾而為天下言者惟其小小得失之際乃敢上章歡譁而無所憚至於國之大事安危存亡之所繫皆將卷舌而去誰敢發而受其禍此人主之所大患也悲夫後世之君徒見天下之權臣出入唯唯以其有禮而不知此乃所以濳潰其國徒見天下之重臣剛毅果敢喜逆其意則以為不遜而不知其有社稷之慮二者淆亂於心而不能辨其邪正是以喪亂相仍而不悟何足傷也昔者衛太子聚兵以誅江充武帝震怒發兵而攻之京師至使丞相太子相與交戰不勝而走又使天下極其所往而剪滅其迹當此之時茍有重臣出身而當之擁護太子以待上意之少解徐發其所蔽而開其所怒則其父子之際尚可得而全也惟無重臣故天下皆能知之而不敢言臣愚以為凡為天下宜有以養其重臣之威使天下百官有所畏忌而緩急之間能有所堅忍持重而不可奪者竊觀方今四海無變非常之事宜其息而不作然及今日而慮之則可以無異日之患不然者誰能知其果無有也而不為之計哉抑臣聞之今世之弊弊在於法禁太密一舉足不如律令法吏且以為言而不問其意之所屬是以雖天子之大臣亦安敢有所為於法令之外以安天下之大事故為天子之計莫若少寬其法使大臣得有所守而不為法之所奪昔申屠嘉為丞相至召天子之幸臣鄧通立之堂下而詰責其過是時通幾至於死而不救天子知之亦不為怪而申屠嘉亦卒非漢之權臣由此觀之重臣何損於天下哉第二道臣聞仲尼之稱管仲曰奪伯氏駢邑三百飯蔬食沒齒無怨言及讀蜀志其言諸葛孔明遷李平殛廖立及孔明既死而此二人皆哭泣有至死者臣每讀書至此未嘗不嗟歎古人之不可及而竊愍今世之不能也夫為天下國家惟剛者能守其法而公者能以剛服天下曾子曰士不可以不弘毅任重而道遠天下者天子之天下也賞罰之柄豫奪之事其出於天子本無敢言者惟其不公故有一人焉受戮而去雖其當罪而亦勃然有不服之心而上之人雖其甚公於此而亦畏其不服而不敢顯然明斥其罪故夫天下之不公足以敗天下之至剛而天下之不剛亦足以破天下之至公二者相與並行然後可以深服天下之衆臣常竊悲唐季五代之亂外有執兵强忿之臣威蓋天下而以其力內脅天子天子不敢輒忤其意意有所不恱則其上下不能自保故當此之時人主務為安身之政不敢以其剛心而守其公事此其勢不得不然耳方今海內治安外無諸侯之虞而內無執政之患然臣竊觀之於政令刑賞之際常若有所畏而不能自必者此其故何也夫朝廷之臣無罪而留有罪而黜此為臣之常也故其有罪以為當黜則官必削以為不當黜則無故而置之外地猶為不可也今有罪而推之於外反從而增其爵秩是將以為賞耶為刑耶是不可得而知也蓋曰姑以鎮撫其耿耿之意彼其失為近臣而去也雖賜之千金而猶有所慊然於其心且天下之罪人而皆欲滿其所懷則為天子安可以有所刑戮哉然而事之所不平者又非特如此也黜之者一人則必有折而辨之者一人以為黜者之有所不恱乎其辨之者而使與之皆黜夫此二人其罪果誰在以其言而黜人亦以其言而黜之是為黜者報讐耳是以天下雖無强臣之災而臣下竊揣天子之心皆有所持而邀之此其弊始於執之不剛而成於守之不公矣朝廷之事臣安得知其有所不安者然竊怪每有所除吏民間莫不切切口語以為此誰人之親戚故舊而得之者每有所措置亦莫不以為此誰人之所欲而行之者使上之人凡果如此則宜乎人之受罪而不服而吾亦不敢加於人也詩云人亦有言柔則茹之剛則吐之唯仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏强禦夫人惟不侮鰥寡也而後能不畏强禦臣故曰惟無私者能以剛服天下此其勢然也且夫古之為君者有所大樂而今世不知也人君之樂非樂夫有天下而樂得與天下去惡而獎善以快吾志今使天下有不義之臣誅之不獲而又從而尊之尊之不足以為恱而又從而黜其所怨以慰其盛怒此二事者夫豈為君之樂哉蓋事有所不可並從而欲不可以皆得今夫人之有所私愛而不公者是亦人之所樂焉耳然其為樂有所害於為君之樂是以不若棄彼而全此也且事之利害有知之而患不可為者有患不之知而可行者今欲潔然無私而行吾法之所至有罪而黜黜而無所姑息使天下皆知賞之為賞罰之為罰此非有所勤苦而難成者而顧患不肯為夫管仲孔明惟其為之而巳哉第三道臣聞天下有無窮之才不叩則不鳴不觸則不發是以古之聖人迎其好善之端而作其勉强之氣洗濯磨淬日夜不息凡此將以求盡天下之無窮也夫天下譬如大器焉有器不用而置諸牖下久則蟲生其中故善用器者提㩦不去時濯而溉之使之日親於人而獲盡其力以無速敗有小丈夫知愛其器而不知所以為愛也知措諸地之安而不知不釋吾手之為不壞也是以事不得成而其器速朽且夫天下之物人則皆用其形而不求其神也神者何也物之精華果鋭之氣也精華果鋭之氣其在物也曄然而有光確然而能堅是氣也亡則物皆枵然無所用之夫是氣也時叩而存之則日長而不衰置而不知求則脫去而不居是氣也物莫不有也而人為甚孟子有言曰人之日夜之所息與平旦之氣晝日之所為有以梏亡之矣梏之反覆則其夜氣不足以存夫夜氣者所謂精華果鋭之氣也天下亂則君子有以自養而全之而天下治則天子養之以求其用今朝廷之精明戰陳之勇力獄訟之所以能盡其情而錢穀之所以能治其要處天下之紛紜而物莫能亂者皆是氣之所為也蓋古者英雄之君唯能叩天下之才而存之是以有求而必從有欲而必得漢武帝唐太宗國富而兵强所欲如意而天下之才用之不見其盡當其季年元臣宿將死者太半而新進之士亦自足以辦天下由此觀之則天下固有無窮之才而獨患乎上之不叩不觸而使其神弛放而不張也臣竊觀當今之人治文章習議論明會計聽獄訟所以為治者其類莫不僃有而天下之所甚少者獨將帥武力之臣往者天下既安先世老將已死而西寇作難當此之時天子茫然反顧思得竒才良將以屬之兵而終莫可得其後數年邊鄙日蹙兵勢日急士大夫始漸習兵而西夏臣服以至於今又將十有餘年而曩之所謂西邊之良將亦巳略盡矣而天下之人未知誰可任為將此甚可慮也夫天下之事莫難於用兵而今世之所畏莫甚於為將責之以難事强之以其所畏而不作其氣是以將帥之士若此不可得也蓋嘗聞之善用兵者雖匹夫之賤莫不養其氣然後求其用方其未戰也使之投石超距以致其勇故其後遇敵而不懼見難而致死何者氣盛故也今天下有大弊二以天下之治安而薄天下之武臣以天下之冗官而廢天下之武舉彼其見天下之方然則摧沮退縮而無自喜之意今之武臣其子孫之家往往轉而從進士矣故臣欲復武舉重武臣而天子時亦親試之以騎射以觀其能否而為之賞罰如唐正觀之故事雖未足以盡天下之竒才要以使之知上意之所恱有以自重而爭盡其力則夫將帥之士可以漸見矣第四道臣聞天下之患無常處也惟見天下之患而去之就其所安而從之則可久而無憂有淺丈夫見其生於東也而盡力於東以忘其西見其起於外也而鋭意於外以忘其中是以禍生於無常而變起於不測莫能究也昔者西漢之禍當文景之世天下莫不以為必起於諸侯之太强也然至武帝之時七國之餘日以漸衰天下坦然四顧以為無虞而陵夷至於元成之間朝廷之强臣實制其命而漢以不祀世祖顯宗既平天下以為世之所患莫不在乎朝廷之强臣矣而東漢之亡其禍乃起於宦官由此觀之則天下之患安在其防之哉人之將死也或病於太勞或病於飲酒天下之人見其死於此也而曰必無勞力與飲酒則是不亦拘而害事哉彼其死也必有以啓之是以勞力而能為灾飲酒而能為病而天下之人豈必皆死於此昔唐季五代之亂其亂果何在也海內之兵各隸其將大者數十萬人而小者不下數萬撫循鞠養美衣豐食同其井苦而順其好惡甚者養以為子而授之以其姓故當其時軍旅之士各知其將而不識天子之惠君有所令不從而聽其將而將之所為雖有大姦不義而無所違拒故其亂也姦臣擅命擁兵而不可制而方其不為亂也所攻而必降所守而必固良將徑兵遍於天下其所摧敗破滅足以上快天子鬱鬱之心而外抗敵國竊發之難何者兵安其將而樂為用命也然今世之人遂以其亂為戒而不收其功舉天下之兵數百萬人而不立素將將兵者無腹心親愛之兵而士卒亦無所附著而欲為之效命者故命將之日士卒不知其何人皆莫敢仰視其面夫莫敢仰視是􅍔之本也此其為禍非有脅從駢起之殃緩則畏而怨之而有急則無不忍之意此二者用兵之深忌而當今之人蓋亦已知之矣然而不敢改者畏唐季五代之禍也而臣竊以為不然天下之事有此利也則必有此害天下之無全利是聖人之所不能如之何也而聖人所能要在不究其利利未究而變其方使其害未至而事已遷故能享天下之利而不受其害昔唐季五代之法豈不大利於世惟其利巳盡而不知變是以其害隨之而生故我太祖太宗以為不可以長久而改易其政以便一時之安為將者去其兵權而為兵者使不知將凡此皆所以杜天下之私恩而破其私計其意以為足以變五代豪將之風而非以為後世之可長用也故臣以為當今之勢不變其法無以求成功且夫邀天下之大利則必有所犯天下之危欲享大利而顧其全安則事不可成而方今之弊在乎不欲有搖撼而徒得天下之利不欲有所勞苦而遂致天下之安今夫欲人之成功必先捐兵以與人欲先捐兵以與人則先事於擇將擇將而得將茍誠知其忠雖舉天下以與之而無憂而況數萬之兵哉昔唐之亂其為變者非其所命之將也皆其盜賊之人所不得已而以為將者故夫將帥豈必盡疑其為姦要以無畏其擇之之勞而遂以破天下之大利蓋天下之患夫豈必在此也第五道臣聞天下之勇士可使用兵而不可使主兵天下之智士可使主兵而不可使養兵養兵者君子之事也故用兵之難而養兵尤難何者士氣之難服也舉兵而征行三軍之士其心在號令而其氣在戰息兵而為營三軍之士其心在壘壁而其氣在禦陳兵而遇敵三軍之士其心在白刃而其氣在勝氣之所在者毒之所向也故兵在外士氣在敵而不在其上是故撫之而易恱豫之而易足誅之而易定動之而易使其上之人禦之以勇而驅之以智則百萬之衆可以無足憂者及夫天下既安三軍之士各反其家美衣甘食優游無為投石超距不足以泄其怒而各求其上之所短當此之時軍中之士環視四顧而始不可忍矣是故久於不用則其意不欲復戰久於不使則其意不欲復役夫惟不欲而强使之與之出戰則不樂而與之從役則為亂此必然之勢也夫古者兵出於農其欲動之尤難然當周之季諸侯之强天下之民日起而操兵齊晉秦楚以其兵車役天下萬里而後反而天下之民不敢言病至於後世平居無事竭天下以養士卒一旦有急當得其力乃反傲睨邀賞不肯即去夫其平時衣食其上有難而起起而鬭死有事而役役而盡力此其勢宜若愈於三代之兵夫矣而當今之病方病其不然此豈非其養之之過歟臣觀天下之兵其數莫如京師之多而士卒趦趄難制亦莫如京師之甚何者天子在位以仁禦兵士不知戰而狃於賞令之稍急則瞋目攘臂而言不遜此甚可惡也且京師宗廟禁闈之所在而使不義之徒周環布列於其左右而尚何以為安臣聞養兵而兵驕戾其責在將方今京邑之將所任者誰乎匹夫小人以次當遷而為之什伯之長此其為名尚未離乎卒伍也而其上之所統獨有三太尉推而上之則至於樞密使此數四大臣者非在什伍部曲之間以日夕訓練之者也且夫卒未親附而罰之則不服不服則難用也今使大臣獨制其上恩意不交而德澤不洽上下不相信特其勢相從而無以義附者則是未可以法治也使朝廷大臣而曲躬傴僂親問疾苦如異時出兵行陳之間此則其勢有所不給矣古者南北軍有監軍御史有護兵諸校各有軍正正丞是以任安胡建之徒忠信守節之士得以出入軍中獲其歡心而後訓之以禮繩之以法有所誅滅而士卒皆服如此而後兵可用也今奈何獨使狠戾之人自相臨御而天子獨以貪暴無知之匹夫為左右之衛哉臣愚以為宜略如漢制設為諸校使常處軍中既以撫之且漸誅戮其豪橫而訓之知理傳曰晋悼公知欒糾之能御以和於政也以為戎御使訓諸御知義知荀賔之有力而不暴也以為戎右使訓勇力之士時使故軍中之吏非其近之則不能得其歡心不得其心則雖有法而不能用有法不能用則士不可以勞苦而兵不可以應卒有兵不能以應卒而有將不能以使衆此最天下之大患也欒城應詔集第七卷終
