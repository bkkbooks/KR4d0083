front:
  text: 欒城應詔集第二卷
  hash: sha256:6f59a791a7973e562d60a7d7bccb0352b35a7dbf7015699deb881e7815074145
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0083_SBCK_002-1a}
body:
  text: 進論五首漢論古之聖人制為君臣之分天子以其一身立乎天下之上安受天下之奉己而不辭天下之人竒才壯士爭出其力自盡於天子之下而無所逃遁此二者何為如此也天下之事固其賢者為之也仁人君子盡其心以制天下之事而無所不成武夫猛士竭其力以剪天下之暴亂而無所不定此其類非不智且勇也然而不得其君則其心常鰓鰓然曠四海而不能以自安功成事立缺然反顧而莫之能受是以天下之賢才其才雖足以取之而常喜天下之有賢君者利其有以受之也蓋古之人君收天下之英雄而不失其心故天下皆爭歸之而英雄之士因其君之資以用力於天下功成求得而不敢為背叛之操故上下相守而可以至於無窮惟其君臣相戾而不能以相用君以為無事乎其臣臣以為無事乎其君君無所用以至於天下之不親臣無以用之以至於惸惸而無所底麗而天下始大亂矣且彼不知夫天下之意也天下之人皆人臣也而誰能以相從惟其因天子之權而用之是以雖其比肩之人而莫敢抗彼見天下之莫吾抗也則以為天下之畏我而不知己之戴君之威而行也故或狃天下之畏己而反以求去其君其君既去而天下之人孰畏而不為變哉昔者西漢之衰王莽竊取其人君之權而執之以求取其天下方其執之而未取也天下不知其將取之是以俯首而奉其所為何者天下之心猶以為漢役之也至於天下在莽而其英雄之士遂起而共攻之不數年而莽以大敗何者天下不服無漢之王莽也其後東漢之亂獻帝奔走於草莽之中曹操出之以為帝王當是之時天下已無漢矣而唯曹氏之為聽然天下之英雄猶以為名皆起而爭之終曹公之身而不能以自安猶幸其當時之人皆知漢之天下已去而操收之也是以心服曹氏而安為之臣故孔子曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣蓋天下之位居下而干其上之政者以為己之享其利也而不知天下之爭心皆將囂然而不平是以其素所服者愈狹則其失之也愈速何則其不平者衆也故曰祿之去公室五世矣政在大夫四世矣而三桓之子孫微矣嗚呼公室既微則三桓之子孫天下之所謂宜盛者也而終以衰弱而不振則夫君臣之分可知也巳三國論天下皆怯而獨勇則勇者勝皆暗而獨智則智者勝勇而遇勇則勇者不足恃也智而遇智則智者不足用也夫惟智勇之不足以定天下是以天下之難蜂起而難平蓋嘗聞之古者英雄之君其遇智勇也以不智不勇而後真智大勇乃可得而見也悲夫世之英雄其處於世亦有幸不幸邪漢高祖唐太宗是以智勇獨過天下而得之者也曹公孫劉是以智勇相遇而失之者也以智攻智以勇擊勇此譬如兩虎相捽齒牙氣力無以相勝其勢足以相擾而不足以相斃當此之時惜乎無有以漢高帝之事制之者也昔者項籍乘百戰百勝之威而執諸侯之柄咄嗟叱吒奮其暴怒西向以逆高祖其勢飄忽震蕩如風雨之至天下之人以為遂無漢矣然高帝以其不智不勇之身橫塞其衝徘徊而不進其頑冒椎魯足以為笑於天下而卒能摧折項氏而待其死此其故何也夫人之勇力用而不巳則必有所耗竭而其智慮久而無成則亦必有所倦怠而不舉彼欲就其所長以制我於一時而我閉而拒之使之失其所求逡巡求去而不能去而項籍固巳敗矣今夫曹公孫權劉僃此三人者皆知以其才相取而未知以不才取人也世之言者曰孫不如曹而劉不如孫劉備惟智短而勇不足故有所不若於二人者而不知因其所不足以求勝則亦巳惑矣蓋劉備之才近似於高祖而不知所以用之之術昔高祖之所以自用其才者其道有三焉耳先據勢勝之地以示天下之形廣收信越出竒之將以自輔其所不逮有果鋭剛猛之氣而不用以深折項籍猖狂之勢此三事者三國之君其才皆無有能行之者獨有一劉備近之而未至其中猶有翹然自喜之心欲為椎魯而不能純欲為果鋭而不能達二者交戰於中而未有所定是故所為而不成所欲而不遂棄天下而入巴蜀則非地也用諸葛孔明治國之才而當紛紜戰伐之衝則非將也不忍忿忿之心犯其所短而自將以攻人則是其氣不足尚也嗟夫方其奔走於二袁之間困於呂布而狼狽於荆州百敗而其志不折不可謂無高帝之風矣而終不知所以自用之方夫古之英雄唯漢高帝為不可及也夫晉論御天下有道休之以安動之以勞使之安居而能勤逸處而能憂其君子周旋揖讓不失其節而能耕田射馭以自致其力平居習為勉強而去其惰傲厲精而日堅勤勞而日強冠冕佩玉之人而不憚執天下之大勞夫是以天下之事舉皆無足為者而天下之匹夫亦無以求勝其上何者天下之亂蓋嘗起於上之所憚而不敢為天下之小人知其上之有所憚而不敢為則有以乘其間而致其上之所難夫其上之所難者豈非死傷戰鬬之患匹夫之所輕而士大夫之所不忍以其身試之者邪彼以死傷戰鬭之事邀我而我不能應則無怪乎天下之至於亂也故夫君子之於天下不見其所畏求使其所畏之不見是故事有所不辭而勞苦有所不憚昔者晉室之敗非天下之無君子也其君子皆有好善之心高談揖讓泊然沖虛而無慷慨感激之操大言無當不適於用而畏兵革之事天下之英雄知其所忌而竊乘之是以顚沛隕越而不能以自存且夫劉聰石勒王敦祖約此其姦詐雄武亦一世之豪也譬如山林之人生於草木之間大風烈日之所咻而霜雪飢饉之所勞苦其筋力骨節之所嘗試者亦巳至矣而使王衍王導之倫清談而當其衝此譬如千金之家居於高堂之上食肉飲酒不習寒暑之勞而欲以之捍禦山林之勇夫而求其成功此固姦雄之所樂攻而無難者也是以雖有賢人君子之才而無益於世雖有盡忠致命之意而不救於患難此其病起於自處太高而不習天下之辱事故富而不能勞貴而不能治蓋古之君子其治天下為其甚勞而不失其高食其甚美而不棄其糲使匹夫小人不知所以用其勇而其上不失為君子至於後世為其甚勞而不知以自復而為秦之強食其甚美而無以自實而為晉之敗夫甚勞者固非所以為安而甚美者亦非所以自固此其所以喪天下之故也哉七代論英雄之士能因天下之勢而遂成之天下之勢未有可以必成者也而英雄之士常因其隙而出於其間堅忍而不變是以天下之勢遂成而不可解自晉以下天下何其紛紛也強者不能以相吞而弱者不能以相服其德不足以相君臣而其兵不足以相吞滅天下大亂離而為南北北又離而為東西其君臣又自相篡取而為七代至於隋而後合而為一蓋其間百有餘年之中其賢君名臣纍纍而出者不為少矣然而南不能渡河以有北之民而北不能過江以侵南之地豈其百年之間南無間之足乘而北無隙之可入哉蓋亦其勢之有所不可者也七代之際天下嘗有變矣宋取之晉齊取之宋梁取之齊陳取之梁而周齊取之後魏此五釁者兵交而不解內亂而無救其間非小也而其四鄰拱手遠望而莫敢入蓋其取之者誠有以待之而不可以乘其倉卒也嗟夫北方之人其力不足以並南而南方之勢又固不可以爭衡於中國則七代之際天下將不可合邪嘗試論之姚泓宋武之際天下將合之際也姚興既死而秦地大亂武帝舉江南之兵長驅以攻秦兵不勞而關中定此天下之一時也及夫劉穆之死關中未安席不及暖兵不及息而奔走以防江南之亂留孺子孱將以抗四方強悍之虜則天下之勢巳遂去矣且此唯不能因天下之勢而遂成之也則夫天下之勢亦隨去之而巳矣且夫孫權曹操之事足以見矣曹操之不能過江以攻孫權力有所未足也而孫權終莫肯求逞於中國蓋其志將以僥幸乎北方之大亂然後奮而乘其弊而非以為其地之足以抗衡於中原也嗟夫使武帝既入關因而居之以鎮撫其人民南漕江淮之資西引巴漢之粟而內因關中之盛厲兵秣馬以問四方之罪戾當此之時天下可以指麾而遂定矣而何江南之足以蒂芥夫吾心哉然而其事則不可以不察也其心將有所取乎晉而恐夫人之反之於南是以其心憂懼顚倒而不見天下之勢孔子曰無欲速無見小利欲速則不達見小利則大事不成故夫有可以取天下之勢而不顧以求移其君而遂失之者宋武之罪也隋論人之於物聽其自附而信其自去則人重而物輕人重而物輕則物之附人也堅物之所以去人分裂四出而不可禁者物重而人輕也古之聖人其取天下非其驅而來之也其守天下非其劫而留之也使天下自附不得已而為之長吾不役天下之利而天下自至夫是以去就之權在君而不在民是之謂人重而物輕且夫吾之於人巳求而得之則不若使之求我而後從之巳守而固之則不若使之不忍去我而後與之故夫智者或可與取天下矣而不可與守天下守天下則必有大度者也何者非有大度之人則常恐天下之去我而以術留天下以術留天下而天下始去之矣昔者三代之君享國長遠後世莫能及然而亡國之暴未有如秦隋之速二世而亡者也秦隋之亡其弊果安在哉自周失其政諸侯用事而秦獨得山西之地不過千里韓魏壓其衝楚脅其肩燕趙伺其北而齊掉其東秦人被甲持兵七世而不得解寸攘尺取至始皇然後合而為一秦見其取天下若此其難也而以為不急持之則後世且復割裂以為敵國是以銷名城殺豪傑鑄鋒鏑以絶天下之望其所以備慮而固守之者甚密如此然而海內愁苦無聊莫有不忍去之意是以陳勝項籍因民之不服長呼起兵而山澤皆應由此觀之豈非其重失天下而防之太過之弊歟今夫隋文之世其亦見天下之久不定而重失其定也蓋自東晉以來劉聰石勒慕容苻堅姚興赫連之徒紛紛而起者不可勝數至於元氏並吞滅取略巳盡矣而南方未服元氏自分而為周齊周並齊而授之隋隋文取梁滅陳而後天下為一彼亦見天下之久不定也是以全得天下之衆而恐其失之享天下之樂而懼其不久立於萬民之上而常有猜防不安之心以為舉世之人皆有曩者英雄割據之懷制為嚴法峻令以杜天下之變謀臣舊將誅滅略盡而獨死於楊素之手以及於大故終於煬帝之際天下大亂塗地而莫之救由此觀之則夫隋之所以亡者無以異於秦也悲夫古之聖人修德以來天下天下之所為去就者莫不在我故其視失天下甚輕夫惟視失天下甚輕是故其心舒緩而其為政也寬寬者生於無憂而慘急者生於無聊耳昔嘗聞之周之興太王避狄於岐豳之人民扶老攜幼而歸之岐山之下纍纍而不絶喪失其舊國而卒以大興及觀秦隋唯不忍失之而至於亡然後知聖人之為是寬緩不速之行者乃其所以深取天下者也欒城應詔集第二卷終
