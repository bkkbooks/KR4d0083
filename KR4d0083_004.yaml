front:
  text: 欒城應詔集第四卷
  hash: sha256:50b12ef77118d0ceb5bbe038494f716f98c4378cac17c7cffcda18201cb7f07b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0083_SBCK_004-1a}
body:
  text: 進論五首禮論昔者商周之際何其為禮之易也其在宗廟朝廷之中籩豆簠簋牛羊酒醴之薦交於堂上而天子諸侯大夫卿士周旋揖讓獻酬百拜樂作於下而禮行於上雍容和穆終日而不亂夫古之人何其知禮而行之不勞也當此之時天下之人惟其習慣而無疑衣服器皿冠冕佩玉皆其所常用也是以其人入於其間耳目聰明而手足無所忤其身安於禮之曲折而其心不亂以能深思禮樂之意故其廉恥退讓之心盎然見於其面而坌然發於其躬夫是以能使天下觀其行事而忘其暴戻鄙野之氣至於後世風俗變易更數千年以至於今天下之事巳大異矣然天下之人尚皆記録三代禮樂之名詳其節目而習其俯仰冠古之冠服古之服而御古之器皿傴僂拳曲勞苦於宗廟朝廷之中區區而莫得其紀交錯紛亂而不中節此無足怪也其所用者非其素所習也而強使焉甚矣夫後世之好古也昔者上古之世蓋常有巢居穴處汙樽壞飲燔黍捭豚蕢桴土鼓而以為是足以養生送死而無以加之者矣及其後世聖人以為不足大利於天下是故易之以宮室新之以籩豆鼎俎之器以濟天下之所不足而盡去太古之法惟其祭祀以交於鬼神乃始薦其血毛豚解而腥之體解而爓之以為是不忘本而非以為後世之禮不足用也是以退而體其犬豕牛羊實其簠簋籩豆鉶羹以極今世之美未聞其牽於上古之説選懦而不決也且方今之人佩玉服韍冕而垂旒拱手而不知所為而天下之人亦且見而笑之是何所復望於其有以感發天下之心哉且又有所大不安者宗廟之祭聖人所以追求先祖之神靈庶幾得而享之以安恤孝子之志者也是以思其平生起居飲食之際而設其器用薦其酒食皆從其生以冀其來而安之而後世宗廟之祭皆用三代之器則是先祖終莫得而安也蓋三代之時席地而食是以其器用各因其所便而為之高下大小之制今世之禮坐於牀而食於牀上是以其器不得不有所變雖正使三代之聖人生於今而用之亦將以為便安故夫三代之視上古猶今之視三代也三代之器不可復用矣而其制禮之意尚可依倣以為法也宗廟之祭薦之以血毛重之以體薦有以存古之遺風矣而其餘者可以易三代之器而用今世之所便以從鬼神之所安惟其春秋社稷釋奠釋菜凡所以享古之鬼神者則皆從其器蓋周人之祭蠟與田祖也吹葦籥擊土鼓此亦各從其所安焉耳嗟夫天下之禮宏濶而難言自非聖人而何以處此惟其推之而不明講之而不詳則遂以為不可蓋其近於正而易行庶幾天下之安而從之是固不可易也易論易者卜筮之書也挾策布卦以分隂陽而明吉凶此日者之事而非聖人之道聖人之道存乎其爻之辭而不在其數數非聖人之所盡心也然易始於八卦而至於六十四此其為書未離乎用數也而世之人皆耻言易之數或者言而不得其要紛紜迂闊而不可解此高論之士所以耻而不言歟夫易本於卜筮而聖人濶言於其間以盡天下之人情使其為數紛亂而不可考則聖人豈肯以其有用之言而託之無用之數哉今夫易之所謂九六者老隂老陽之數也九為老陽而七為少陽六為老隂而八為少隂此四數者天下莫知其所為如此者也或者以為陽之數極於九而其次極於七故七為少而九為老至於老隂茍以為以極者而言也則老隂當十而少隂當八今少隂八而老隂反當其下之六則又為之説曰隂不可以有加於陽故抑而處之於下使隂果不可以有加於陽也而曷不曰老隂八而少隂六且夫隂陽之數此天地之所為也而聖人豈得與於其間而制其豫奪哉此其尤不可者也夫隂陽之有老少此未嘗見於他書也而見於易易之所以或為老或為少者為夫揲蓍之故也故夫説者宜於其揲蓍焉而求之揲蓍之法曰挂一歸竒三揲之餘而以四數之得九而以為老陽得八而以為少隂得七而以為少陽得六而以為老隂然而隂陽之所以為老少者不在乎七八九六也七八九六徒以為識焉耳老者隂陽之純也少者隂陽之雜而不純者也陽數皆竒而隂數皆偶故乾以一為之爻而坤以二天下之物以少為主故乾之子皆二隂而坤之女皆二陽老隂老陽者乾坤是也少隂少陽者乾坤之子是也揲蓍者其一揲也少者五而多者九其二其三少者四而多者八多少者竒偶之象也一爻而三揲譬如一卦而三爻也隂陽之老少於卦見之於爻而於爻見之於揲使其果有取於七八九六則夫此三揲者區區焉分其少多而各為之處果何以為也今夫三揲而皆少此無以異於乾之三爻而皆竒也三揲而皆多此無以異於坤之三爻而皆偶也三揲而少者一此無以異於震坎艮之一竒而二偶也三揲而多者一此無以異於巽離兌之一偶而二竒也若夫七八九六此乃取以為識而非其義之所在不可強以為説也書論愚讀史記商君列傳觀其改法定令變更秦國之風俗誅秦民之議令者以數千人黥太子之師劓太子之傅而後法令大行蓋未嘗不壯其勇而有決也曰嗟夫世俗之不可與慮始而可與樂終使天下之人各陳其所知而守其所學以議天子之事則事將有格而不得成者然及觀三代之書至其將有以矯拂世俗之際則其所以告諭天下者常丁寧激切亹亹而不倦務使天下盡知其君之心而又從而折其不服之意使天下皆信以為如此而後從事其言回曲宛轉譬如平人自相議論而詰其是非者愚始讀而疑之以為近於濡滯迂遠而無決然其使天下樂從而無黽勉不得巳之意其事既發而無紛紜異同之論此則王者之意也故常以為當堯舜之時其君臣相得之心歡樂而無間相與吁俞嗟歎唯諾於朝廷之中不啻若朋友之親雖其有所相是非論辨以求曲直之當亦無足怪者及至湯武征伐之際周旋反覆自述其用兵之意以明曉天下此又其勢然也惟其天下既安君民之勢濶遠而不同天子有所欲為而其匹夫匹婦私有異論於天下以齟齬其上之畫策令之而莫肯聽當此之時形驅而勢脅之天下夫誰敢不聽從而其上之人優遊而徐譬之使之信之而後從此非王者之心誰能處而待之而不倦歟蓋盤庚之遷天下皆咨嗟而不恱盤庚為之稱其先王盛德明聖而猶五遷以至於今今不承於古恐天之斷棄汝命不救汝死既又恐其不從也則又曰汝罔暨余同心我先后將降汝罪疾乃祖先父亦將告我高后曰作大戮於朕孫蓋其所以開其不悟之心而諭之以其所以當然者如此其詳也若夫商君則不然以為要使汝獲其利而何恤乎吾之所為故無所求於衆人之論而亦無以告諭於天下然其事亦終於有成是以後世之論以為三代之治柔懦而不決然此乃王霸之所以為異者也夫三代之君惟不忍鄙其民而欺之故天下有故而其議及於百姓以觀其意之所向及其不可聽則又反覆而諭之以窮極其説而服其不然之心是以其民親而愛之嗚呼此王霸之所為不同也哉詩論自仲尼之亡六經之道遂散而不可解蓋其患在於責其義之太深而求其法之太切夫六經之道惟其近於人情是以久傳而不廢而世之迂學乃皆曲為之説雖其義之不至於此者必強牽合以為如此故其論委曲而莫通也夫聖人之為經惟其於禮春秋然後無一言之虛而莫不可考然猶未嘗不近於人情至於書出於一時言語之間而易之文為卜筮而作故時亦有所不可前定之説此其於法度巳不如禮春秋之嚴矣而況乎詩者天下之人匹夫匹婦羈臣賤隸悲憂愈佚之所為作也夫天下之人自傷其貧賤困苦之憂而自述其豐美盛大之樂其言上及於君臣父子天下興亡治亂之迹而下及於飲食牀第昆蟲草木之類蓋其中無所不具而尚何以繩墨法度區區而求諸其間哉此亦足以見其志之不通矣夫聖人之於詩以為其終要入於仁義而不責其一言之無當是以其意可觀而其言可通也今詩之傳曰隱其雷在南山之陽出自北門憂心殷殷揚之水白石鑿鑿終朝采緑不盈一掬瞻彼洛矣維水泱泱若此者皆興也而至於關關雎鳩在河之洲南有樛葛藟纍之南有喬木不可休息維鵲有巢惟鳩居之喓喓草蟲躍躍阜螽若此者又皆興也其意以為興者有所取象乎天下之物以自見其事故凡詩之為此事而作而其言有及於是物者則必強為是物之説以求合其事蓋其為學亦以勞矣且彼不知夫詩之體固有比也而皆合之以為興夫興之為體猶曰其意云爾意有所觸乎當時時巳去而不可知故其類可以意推而不可以言解也隱其靁曰隱其靁在南山之陽此非有所取乎靁也蓋必其當時之所見而有動乎其意故後之人不可以求得其説此其所以為興也若夫關關雎鳩在河之洲是誠有取於其摯而有别是以謂之比而非興也嗟夫天下之人欲觀於詩其必先知夫興之不可以與比同而無強為之説以求合其作時之事則夫詩之義庶幾乎可以意曉而無勞矣春秋論事有以拂乎吾心則吾言忿然而不平有以順適乎吾意則吾言優柔而不怒天下之人其喜怒哀樂之情可以一言而知也喜之言豈可以為怒之言邪此天下之人皆能辨之而至於聖人其言丁寧反覆布於方册者甚多而其喜怒好惡之所在者又甚明而易知也然天下之人常患求而莫得其意之所主此其故何也天下之人以為聖人之文章非復天下之言也而求之太過求之太過是以聖人之言更為深遠而不可曉且夫天下何不以已推之也將以喜夫其人而加之以怒之之言則天下且以為病狂而聖人豈有以異乎人哉不知其好惡之情而不求其言之喜怒是所謂大惑也昔者仲尼刪詩於衰周之末上自商周之盛王至於幽厲失道之際而下訖於陳靈自詩人以來至於仲尼之世蓋已數百餘年矣愚嘗怪大雅小雅之詩當幽厲之時而稱道文武成康之盛德及其終篇又不見幽厲之暴虐此誰知其為幽厲之詩而非文武成康之詩者蓋察於辭氣有幽憂不樂之意是以系之幽厲而無疑也若夫春秋二百四十二年之間天下之是非雜然而觸乎其心見惡而怒見善而喜則夫是非之際又可以求諸其言之喜怒之間矣今夫人之於事有喜而言之者有怒而言之者有怨而言之者喜而言之則其言和而無傷怒而言之則其言厲而不溫怨而言之則其言深而不誠此其大凡也春秋之於仲孫湫之來曰齊仲孫來於季友之歸曰季子來歸此所謂喜之之言也於魯鄭之易田曰鄭伯以璧假許田於晉文之召王曰天王狩於河陽此所謂怒之之言也於叔牙之殺曰公子牙卒於慶父之奔曰公子慶父如齊此所謂怨之之言也夫喜之而和怒之而厲怨之而深此三者無以加矣至於公羊穀梁之傳則不然日月土地皆所以為訓也夫日月之不知土地之不詳何足以為喜而何足以為怒此喜怒之所不在也春秋書曰戎伐凡伯於楚業而以為衛伐凡伯春秋書曰齊仲孫來而以為吾仲孫怒而至於變人之國此又喜怒之所不及也愚故曰春秋者亦人之言而巳而人之言亦觀其辭氣之所嚮而巳矣欒城應詔集第四卷終
