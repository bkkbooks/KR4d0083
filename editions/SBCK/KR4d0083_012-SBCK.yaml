body:
  text: 策一道御試制策問目具東坡集臣謹對曰臣不佞陛下過聽策臣於庭使得竭愚衷以奉大對臣性狂愚不識忌諱伏讀陛下制策凡所以問臣之事數十條者臣已詳聞之矣然臣內省愚誠欲先以聞而後荅陛下以所問伏惟陛下承先帝之業卽位以來三十餘年四方乂安陛下守此太平之成基平日無事端居靜慮亦嘗有憂於此乎無憂於此乎陛下策臣曰朕承祖宗之大統先帝之休烈深惟寡昧未燭於理又曰志勤道遠治不加進夙興夜寐于兹三紀此陛下憂懼之言也然臣以謂陛下未有憂懼之誠耳往者寶元慶曆之間西羗作難陛下晝不安坐夜不安席當此之時天下皆謂陛下憂懼小心如周文王然而自西方􅄙兵陛下棄置憂懼之心而不復思者二十年矣古之聖人無事則深憂有事則不懼夫無事而深憂者所以爲有事之不懼也今陛下無事則不憂有事則大懼臣以爲陛下失所憂矣故願陛下雖天下無事而不忘憂懼之心陛下誠能用臣此言則凡所以問臣者臣雖不言可得而舉也苟未能用臣此言則凡所以問臣者臣雖言之無益也制策曰德有所未至教有所未孚闕政尚多和氣或盭陛下思慮至此此則聖人之用心也臣請爲陛下推其本原而極言其故臣聞之書曰與治同道㒺不興與亂同事㒺不亡昔者夏之衰也有太康商之微也有祖甲周之敗也有穆王漢之卑也有成帝唐之亂也有穆宗恭宗此六帝王者皆以天下之治安朝夕不戒沈湎于酒􅂽躭于色晚朝早罷早寢晏起大臣不得盡言小臣不得極諫左右前後惟婦人是侍法度正􅀡之言不留于心而惟婦言是聽謁行于內勢横于外心荒氣亂邪僻而無所主賞罰失次萬事無紀以至於天下大亂而其心不知也是以三代之季詩人疾而悲傷之曰匪教匪戒時惟婦寺聽言則對誦言如醉又曰亂匪降自天生自婦人赫赫宗周裒姒滅之葢傷其不可吿教而至于敗也臣疎賤之臣竊聞之道路陛下自近歲以來宮中貴􅁎至以千數歌舞飲酒歡樂失節坐朝不聞咨謨便殿無所顧問夫三代之衰漢唐之季其所以召亂之由陛下巳知之矣久而不正百蠧將由之而出內則將爲蠱惑之所汙以傷和伐性外則將爲請謁之所亂以敗政害事婦人之情無有厭足迭相誇尚爭爲侈靡賜予不足以自給則不憚於受賂賄賂賄旣至則不憚於私謁私謁旣行則內外將亂陛下無謂好色於內而不害外事也且臣聞之欲極必厭樂極必反方其極甚之時一陷於其中而不能以自出然及其覺悟之後未始不以自悔也陛下何不試於淸閑之時上思宗廟社稷之可憂內思疾疚病恙之可惡下思庶人百姓之可畏則夫嬪御滿前適足以爲陛下憂而未足以爲陛下樂也伏惟聖心未之思焉是以遲遲而不去詩云顚沛之揭枝葉未有害本實先撥方今承祖宗之基四方無虞法令修明百官繕完而陛下奈何先自撥其本哉臣恐如此德教日以陵遲闕政將至於敗戾氣將至於災而不可救也制策曰田野雖闢民多亾聊邊境雖安兵不可撤利入巳浚浮費彌廣臣以爲地有所未闢是以民不得安其生邊境雖安而非誠安是以兵不得徹其僃浮費日廣是以利入浚而不能休何者自京以西近自許鄭而遠至唐鄧凡數千里列郡數十土皆膏􅃾古之賦輸太半多出於此自兩漢以來名臣賢守所以爲民興利除害溝洫畆澮之迹往往猶在而荆􅁄成林無尺寸之耕狐貍豺狼之所嘷而逃兵罷士之所竄伏陛下所使守此地者終無一人爲陛下深思極慮招來流亾以墾化其地賢才良士以爲此僻遠之處而不肯往陛下何不使大臣舉人而守之親召而勉勵其志屬以此事而亦以此爲殿最之課不及十年此將皆爲天下之沃壤臣故曰地有所未闢是以民不得安其生也臣又聞古之制邊備者外有亭障內有屯兵亭障欲繁屯兵欲簡繁則耳目明簡則氣勢合今者邊境之患患在亭障之地而皆屯兵以待寇至屯兵之處兵分力弱而不足以備禦夫屯兵於亭障之地者兵必不能甚多也兵不能甚多則寇至必不能抗而徒棄甲兵於無用此拙守者之計也然今之人又患夫屯之不密而歲益増焉小屯不滿百人大屯不過數百城壘之廣狹弱􅃓乏矢可以越而過者往往是也然而前守之所成後守不敢徹非不知徹也恐後之有敗事而以是爲過也兵法曰善攻者敵不知所守善守者敵不知所攻夫敵不知所攻非連臂而守之也雖連臂而守之敵尚可得攻而絶也古之善守者置兵於要害之地則敵人不敢過而爲盜何者畏吾之乘其背也過人之城而又遇城焉則腹背而受敵此用兵之深忌也今􅀦家不料敵之不敢過吾城以深入吾地而懼敵之敢入深也夫敵之過吾城以深入吾地是吾利也而又何患乎臣故欲収諸小屯無益之兵而聚之大屯諸故小屯皆廢以爲亭障嚴斥候謹烽燧以爲大屯之耳目置大屯於要害之地以􅄱制戎狄高城深池精爲守備使可以對敵逾月而不陷制爲諸屯使其相去之遠近可以輕兵十日而相救臣讀古兵書戰國䇿未嘗見有敵人敢越大城深入而爲寇者臣故曰邊境雖安而非誠安是以兵不得徹其僃也臣又聞人君之於天下本非有情愛相屬如父子兄弟之親也上以其勢臨下則下以其勢奉上二者相持而行不相悅則􅄙不相合則叛譬如草木之於地也託之而生判然二物也有根而綢􅓎之交横相入而至於不可拔及其不相入也木槁於上而根不下屬地確於下而氣不上接一夫之力可抜而取也飄風暴雨可披而離也是以古之聖人於其無事之時必深結百姓之心使之歡忻交通分義積厚而不忍相棄於緩急之際昔漢之文景優裕天下時使薄斂寛田租宥罪戾當此之時雖天下和平猶未見其利及至末世賊臣竊命國綂巳絶而天下之心猶依依不忍離漢者徒以文㬌之所以愛之者深而不可􅁯也􅀦家自祖宗以來至於陛下四世矣陛下之所以深結於民者何也民之所好者生也所惜者財也陛下擇吏不精百姓受害於下無所吿訴則是陛下未得以生結民也陛下賦斂煩重百姓日以貧困衣不葢體則是陛下未得以財結民也吏之不仁尚可以爲吏之過賦斂之不仁誰當任其咎且陛下凡所以用財者果何事乎上有官吏之俸下有士卒之廩外有夷狄之賂此三者陛下未得省之之術臣亦未敢以爲言也臣獨怪陛下內有宮中賜予玩好無極之費此何爲者凡今百姓所爲一物巳上莫不有稅茶鹽酒鐵關市之征古之所無者莫不並行疲民咨嗟不安其生而宮中無益之用不爲限極所欲則給不問無有司會不敢爭大臣不敢諫執契持敕迅若兵火陛下外有北狄西戎歲邀金繒而又內自爲一穽以耗其所遺餘臣恐陛下以此獲謗而民心之不歸也故臣願陛下日夜自損以礪左右痛爲節儉以寛百姓􅂢錦繡棄金玉以質素爲貴賦稅之入獨以供不得巳之費使天下知戴陛下之德一旦有緩急則民尚可以使之無叛臣故曰浮費日廣是以利入浚而不能止者此之謂也制策曰軍冗而未練官冗而未澄夫軍冗未練則爲無兵官冗未澄則爲無吏古者民多則兵衆兵衆則􅀦强今兵衆而至於以爲冗者則是不耕而食之過也然而屯田之利是當今之至計也然而屯田之不用則亦有􅀃有兵而不可使耕一也天下須兵之地無官田而閑田之鄕不須兵二也此二患者臣嘗慮之葢亦以爲無難也有兵而不可使耕臣亦不敢强使也計今天下之兵一歲死亡幾何而以其數募民爲兵且屯田民自將有應此選者則今不耕之兵十數歲之後其存者將有幾此非屯田之所當畏者一也天下郡縣未嘗無官田郡縣之無宮田者嘗有之而官鬻之也籍沒之田歲歲不絶舉而積之而田皆在官矣閑田之鄕不過京師之西雖差遠於京畿然而車馳卒奔可以不過旬日而至有欲用之可以緩急而召雖禁衛之兵亦可以循漢之故發郡縣之兵充之朞年而一易京師可獨置天子腹心之軍數萬人以制四方之客軍使之獨得不耕而食如周之環人漢之羽林佽飛之􅀋此又非屯田之所當畏者二也如此而兵冗之弊可以去矣臣又聞方今用人之􅁦有二吏多也吏雜也吏多之弊輕吏雜之弊重吏多而不雜則賢不肖猶有辨也多而不免於雜旣費廩祿又不得賢也費廩祿則􅀦貧不得賢則事不舉均之二弊事不舉者所當先治也如臣之意且可使審官銓曹密院三班分别天下之官其事之爲天下之要而其地之爲一方之急者别之以爲一等而使諸道之職司各第其吏之廉明喜事最異者而上之於審官銓曹密院三班而審官銓曹密院三班卽任之以此至於其餘不急之官則又爲一等使碌碌之吏以今先後之法占之此法旣行要以世之庸吏必將羣議而聚怨然臣以爲聖人之爲天下不憚人之有怨心而問其怨之當否今世之患上之人畏下太甚而下之人持上太過上以其法御下而下反以法攻上之失是以在上者不敢有所興利除害而惟法之聽法者上之所當用耳而豈亦使天下之人以繩上哉此太甚也臣讀後魏書觀其始時天下用兵武夫悍卒皆得爲吏而當此之時吏道不雜何者其所用者皆賢而不賢者未嘗用也及其後世患夫不用者之多怨也是以崔亮從而更之不問士之賢愚而專以停觧日月爲斷沈􅆡者皆稱其能而魏之失人自是而始故臣欲分而别之以爲賢不肖之辨如此而官冗之弊可除矣陛下興庠序於久亡悼禮樂之未備思繼可封之俗欲隆皆讓之節而訟未息深求其故歸咎在位以爲教化不足而法律有餘是以民不知避吏不知懼咨嗟怨讟並興而不止思所以治之不得其道臣聞善治天下者不必有美名而有亹亹之實功不善治天下者其名不必不美而其實空虛無益於事陛下自卽位以來登庸俊良力興美政以教化天下者於今凡幾矣慶曆之中勸農桑興學校當此之時天下以爲三代之風可以漸復然而學校旣興農桑旣勸而天下之風俗卒何以異於慶暦之始今者陛下又發德音分遣使者廵行天下或以寛恤或以減省或以均稅名號紛紜而出天下又皆翕然知陛下之欲速於爲治也然臣以爲陛下惑於虛名而未知爲政之綱也且陛下以爲此數事者足以致治耶不足以致治耶陛下設官置吏其職亦有治此等事者耶其未有耶臣以爲凡陛下之所以分裂海内以爲郡縣其中上有守令下有丞尉大有會府次有職司者凡所以治此數事耳今陛下欲寛卹百姓以至於特命使者則是此等常爲􅁀也陛下欲減省均稅以至於特命使者則是此等皆不可使也臣觀陛下之意不過欲使史官書之以邀美名於後世耳故臣以爲此陛下惑於虛名也今夫諸道之職司是天下之綱雖然尚非陛下之所當擇陛下當擇宰相而宰相當擇職司耳天下諸道凡十有七一道之職司少者三人而多者不過四人均之十七道者其替換迭代不過四五十人也以士大夫之多擇四五十人而用之宜其甚足今乃不擇賢否而任之至於有事則更命使者故臣以爲陛下未知爲政之綱也夫綱雖大不知舉而何教化之能興故臣願陛下興教化自擇職司始而天下可以漸治矣陛下戒愼天災震懼日食淫雨煗氣江河之失度而思聞吿戒消伏之理推劉向之􅀓考呂氏之紀夫劉向之􅀃五行事各以􅀋感􅆡於一方而不得相通呂氏之書隨其時月而指其必然之災異其言皆迂怪而難信安足爲陛下道哉臣聞災異之􅀃有二有可得而推知其所從來者有不可得而推知其所從來者可得而推者人之所爲也不可得而推者天之所爲也人之所爲者不過盜賊竊發於山林戰敗兵破而不得復盜賊竊發是衣食不足政􅁀吏苛之罪也戰敗兵破是任人不明將不爲用之過也至於天之所爲凶旱水溢蟲蝗霜雹日食地震星辰隕墜是安知其所由來哉譬如人之將病也五臟失據於中而變見動於四肢發於百體醫者切其脉而觀其色曰是心病也胏病也是皆可也至於􅀑嘯於梁捐瓦於堂而動之曰是心也是胏也則可乎要以人之神明精爽消散而不充是以邪物得而干之而尚何擇乎心胏之間哉古之儒者其論災異則皆有此弊也今使􅀦家治强人民乂安和氣充實於天地之間則天爲之明地爲之靜三辰爲之光及其少衰則天地三辰皆將虧缺而不寧頃者水冒京城日食季夏江河淮汴破溢爲害地震生毛水變赤色此數事者使董仲舒劉向之徒出而論之必將指􅀦政之一二以爲其驗而臣以爲不然蓋臣非以爲不爲災也以爲天地之遠而至於爲之變動此非一事之所能致蓋天下之政皆失其中是以其氣衰弱挫沮而不振以至於是以爲陛下歷數天下之弊而使陛下盡脩之云耳非正陽之月而伐鼓救變􅀃者以爲非經然而要以脅隂助陽則雖非正陽而不爲失當盛夏之月而論囚報重說者以爲非古然而要以使犯法者無久繫之殃而民覩爲惡之速及則雖當盛夏而亦不爲非也陛下愍四方之未治而推其源於京師知淫巧僭差之失度而欲各爲之節然而未獲所以禁之術是以欲先治內則惑於何以爲京師之言欲先擿姦則惑於不撓獄市之􅀃今陛下任人使爲京兆如得趙廣漢耶則安可以不撓獄市而拘其才如得黃霸耶則安可以擿姦而責其效各隨其才而用之則可以至於治矣然臣以爲莫若先之以猛而終之以寛頃者陛下之所任皆能猛矣而不能寛皆得其始矣而不知其所以爲繼之術是以京兆之政大則斬戮小則笞箠歷歲百餘而終無有一人能以仁恕爲治者故其民狃於􅆿戮而不知懼然而不先之以猛臣又恐仁恕之不能折夫强暴也陛下深探儒老之是非而至於漢文漢武治亂之際臣聞老子之所以爲得者淸淨寡欲而其失也棄仁義絶禮樂儒者之得也尊君卑臣而其失也崇虚文而無實用然而道之可以長行而無弊者莫過於儒術其所以有弊者治之過也漢文取老子之所長而行之是以行之而天下豐漢武取儒者之失而用之是以用之而天下弊此儒老得失之辨也昔者周公遭變而作豳詩雖言王業之本而要以自明其身之無罪是以謂之國風宣王北伐其事雖大而其詩非大雅之體是以謂之小雅故夫寛柔敦厚者大雅之風也慷􅁣勁正者小雅之文也以此推之則可以辨矣三代之時財賦之用有司掌之而􅃁宰特因其歲之凶豐上下而制其用度多少之節葢亦如此而巳至於有唐正觀開元之際猶委之郞官其後四方用兵而財用之間亦遂有權時應變之事郞官有所不能辦故立使以主之及其末世使又不能辦則又舉而歸之宰相是以李德裕之徒皆治其事以一有司之職而累天下之宰由此言之則夫陳平韋質之論有不妄矣若夫泉貨之輕重始於周景王而後有二品之差命秩之實始於魏武帝而後有六等之號水旱蓄積之備莫如李悝之平糴邊陲守禦之方莫如張仁愿之築城圜法九府之名自天府太府王府內府外府職內職金職歲職幣皆列職於周官樂語五均之義天子取諸侯之士以爲􅀦均則市不二價其􅀃見於河間獻王之禮此數事者皆非有益於當世之務是以不足深論也伏惟陛下諮謨􅀦事丁寧反覆終而復始不忍捨去故於制策之終則又曰富人彊國尊君重朝弭災致祥改薄從厚此皆前世之急政而當今之要務子大夫其悉意以陳母悼後害夫陛下丁寧激切至於如此而臣何敢不爲陛下申重其􅀃今陛下憂思天下若此其至而其功不就者豈非無其人之故耶臣聞求賢不如變俗俗所不悅雖有賢者將不能自立俗苟好之雖天下之人將從風而靡昔太祖好武略則天下之猛士出而爲之兵太宗好竒謀則天下計畫之士出而爲之慮眞宗好文而愛儒則海內無有不學以待上之所使今陛下公􅀸滿朝進趨揖讓文學言語上可以不愧於古人而下可以遠過於近世者以陛下誠好之也然陛下中夜不寐起坐而思之天下之事所未能舉者凡有幾何府庫空虛入不支出而不能均兵革怠惰驕而不爲用而不能制閑田滿野民食不足而不能闢河水歲決北人受害而不能救戎狄放肆邀取金幣而不能服陛下治天下而至使不察察有如此者得非陛下所好非所當用耶狄仁傑有言文士中不足快意要得竒才之士與共天下乃進張柬之以代李嶠蘇味道而臣亦以爲治天下當得渾質剛直不忌不克不擇劇易之人而任之如漢之絳侯條侯魏之賈逵鄧艾晉之温嶠周訪唐之婁師德郝處俊得此數人唯陛下所欲用之致之朝廷之上則賢人益親置之邊境之上則惡言不至如此人者陛下豈不欲用之故臣願陛下改易所好以變天下之俗則當今之文人皆可使爲朴􅀡之士陛下何憚而久不爲也臣本布衣書生陛下授之以爵祿而又親策之於廷陛下罄竭所疑以問之於臣而臣何敢不盡其中之所懷以輸之陛下凡制策之所以問臣者臣謹巳􅀡率愚意竊揣而􅄭論之矣才智短淺不足以上塞明詔無補於聰明之萬一謹俯伏待罪然臣之微意所欲丁寧而致之陛下者終欲爲陛下畢盡其􅀃臣聞聖人欲有其富則保之以儉欲久其尊則守之以謙欲安其佚則行之以勞欲得其欲則濟之以無欲此四者聖人之所以盡天下之利而人不以爲貪極天下之樂而不爲人所厭者也老子曰聖人以其無私故能成其私由是觀之則夫欲樂其富而用之以奢者其富必亡欲大其尊而用之以倨者其尊必㬱欲享其逸而用之以惰者其佚必窮欲獲其欲而用之以肆者其欲必廢是以聖人處衆人之所惡而使天下無異辭然後全享天下之利而無所失故夫斥弃金玉不貴錦繡非以爲愛財也畏大臣禮小臣非以爲尚賢也雞鳴而起日昃不食非以爲集事也去聲色放犬馬非以爲美名也凡所以深服天下而消其爭心焉耳伏惟陛下覽策之始以無忘憂懼之心則又覽其終以去其太甚消天下不平之意二者旣行則大臣之所言者舉可以漸用而無弊矣惟陛下愼思之力行之無以臣言爲妄蓋臣之所見當今天下之事未有急於此者陛下幸而留意天下不勝幸甚謹對欒城應詔集第十二卷終
