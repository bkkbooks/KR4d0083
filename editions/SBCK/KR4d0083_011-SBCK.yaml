body:
  text: 王者不治夷狄論儒者必愼其所習習之不正終身病之公羊之書好爲異􅀃而無統多作新意以變惑天下之耳目是以漢之諸儒治公羊者比於他經最爲迂闊至於何休而其用意又甚於公羊蓋其勢然也經書公及戎盟于濳公羊猶未有􅀃也而休以爲王者不治夷狄錄戎來者不拒去者不追也夫公之及戎盟于濳也時有是事也時有是事而孔子不書可乎故春秋之書其體有二有書以見褒貶者有書以記當時之事僃史記之體而其中非必有所褒貶予奪者公之及戎盟于濳是無褒貶予奪者也而休欲必爲之􅀃是以其說不得不􅄭也且王者豈有不治夷狄者乎王者不治夷狄是欲苟安於無事者之􅀃也古之所以治夷狄之道世之君子嘗論之矣有用武而征伐之者高宗文王之事是也有脩文而和親之者漢之文景之事是也有閉拒而不納之者光武之謝西域絕匈奴之事是也此三者皆所以與夷狄爲治之大要也今曰來者必不可拒則是光武之謝西域以息中國之民者非乎去者必不可追則是高宗文王凡所以征其不服而討其不庭者皆非也凡休之􅀃施之於中􅀦强盛夷狄暴橫之時則將養宼以遺子孫之憂施之於中􅀦新定休息自養之際則爲夷狄之所役使以自勞􅁦而不得止凡此二者休之􅀃無施而可也蓋愚聞之聖人之於戎狄也吾欲來之則來之雖有欲去者不可得而去也吾欲去之則去之雖有欲來者亦不可得而來也要以使吾中􅀦不失於便而置夷狄於不便之地故其屈伸進退莫不在我而休欲其自來而自去也耶此其尤不可者也治休之學者曰春秋託始以治天下當隱公之際未暇遠畧故先書晉滅夏陽不書楚滅榖鄧夫穀鄧之不書是楚之未通而不吿也如使聖人未欲與夷狄交通則雖有欲至尚可得而至哉愚故曰春秋之書公及戎盟于濳是記事之體而無休之說也劉愷丁鴻孰賢論天下之讓三有不若之讓有相援之讓有無故之讓讓者天下之大功大善也然而至於無故之讓則聖人深疾而排之以爲此姦人之所以盜名於暗世者也昔者公族穆子之讓韓起范宣子之讓智伯宣子穆子中心誠有以愧於彼二人也是不若之讓也舜之命禹也讓於臯陶其命益也讓於朱虎熊羆夫臯陶之不能當禹之任朱虎熊羆之不能辦益之事亦巳明矣然猶讓焉者此所謂相援之讓也夫使天下之人皆能讓其所不及則賢材在位而賢不肖不爭皆能讓以相援則君子以􅀋升而小人不能間此二者天下之大美也然而至於無故之讓則天下之大不善也東漢之衰丁鴻鄧彪劉愷此三人者皆當襲父爵而以讓其弟非是先君之命非有嫡庶之别而徒讓焉以自高於世俗世之君子從而譏之然此三人者之中猶有優劣焉劉鄧讓而不反以遂其非丁鴻讓而不終聽其友人鮑駿之言而卒就􅀦此鴻之所以優於劉鄧也且夫聞天下之有讓而欲竊取其名以自高其身以邀望天下之大利者劉愷之心也聞天下之讓而竊慕之而不知其不同以陷於不義者丁鴻之心也推其心而定其罪則愷在可戮而鴻爲可恕此眞僞之辨也賢愚可以見矣故范雎曰太伯伯夷未始有其讓也故太伯稱至德伯夷稱賢人末世徇其名而昧其致則詭激之行興矣若夫鄧彪劉愷讓其弟以取義使弟受非服而已受其名不已過乎夫君子之立言非以苟顯其理將以啟天下之方悟者立行非以苟顯其身將以教天下之方動者言行之所開塞可無愼乎丁鴻之心主乎忠愛何其終悟而從義也異乎數子之徇名者也嗟夫世之邪僻之人盜天下之大利自以爲人莫吾察而不知君子之論有以見之故爲􅀦者不可以不貴君子之論也禮義信足以成德論周衰凡所以教民之具旣廢而戰攻侵伐之役交横於天下民去其本而爭事於末當時之君子思救其弊而求之太迫導之無術故樊遲請學爲稼又欲爲圃而孔子從而譏之曰小人哉樊須也上好禮則民莫敢不肅上好義則民莫敢不服上好信則民莫敢不用情夫如是四方之民襁􅀒其子而至矣焉用稼釋之曰禮義與信足以成德又安用稼哉嗟夫仁人之言其始常若迂闊而不可行然要其終其取利多而卒以無弊者終莫能易其􅀃蓋孔子之於衛常欲正名而子路笑之矣冉子之於魯常欲徹而魯君非之矣何則衛之亂若非正名之所能安而魯之饑若非徹之所能救然而欲天下無饑與亂則非此二者莫之能濟故夫欲取其利而取之於遠則取利多而民不知欲圖其事而圗之於深則事有漸而後無􅁦今夫樊遲欲爲農圃以富民而孔子答之以禮義信也天下疑之而愚以爲不然若觀於孟子而求其所以辨許行之􅀃則夫農圃之事乃有可以禮義致而可以信取之道何者許子欲使君臣竝耕饔飱而治此豈非樊子所願學者哉而孟子答之以堯舜無所用心於耕稼堯以不得舜爲憂舜以不得禹爲憂堯得舜舜得禹而禮義流行忠信洋溢則天下之民將不勸之耕而自爲耕不督之圃而自爲圃而何致於身服農圃之勞而憂農圃之憂哉且夫欲勸天下之農而至於親爲之者亦足以見其無術矣古之聖人其御天下也禮行而民㳟則役使如意義行而民服則勞苦而不怨信行而民用情則上下相知而教化易行三德旣成則民可使蹈白刃而無怨而況農圃之功哉故夫欲致其功而􅄱之於遠則功可成欲力其事而爲之於近則百弊起今欲君子小人而皆從事於農則夫天下之民尚誰使治之哉􅄱勢不如德論三代之時法令寛簡所以隄防禁固其民而尊嚴其君者舉皆無有而其所都之地又非有深山大河之固然而歷歲數百長久而安存者何耶秦之法令可謂峻矣而其所都又關中天府之固古之所謂百二者也然而二世而亾者何耶太史公曰權勢法制所以爲治也地􅄱險阻所以爲固也然而二者猶未足恃也故曰􅄱勢雖强猶不如德也天下之形勢愚嘗論之矣讀易至於坎喟然而嘆曰嗟夫聖人之所以教人者葢詳之矣夫坎之爲言猶曰險也天之所以爲險者以其不可升而地之所以爲險者以其有山川丘陵天地之險愚聞之矣而人之險愚未之聞也或曰王公設險以守其􅀦此人之險而高城深池之謂也曰非也高城深池此無以異於地之險而人之險法制之謂也天下之人其初蓋均是人也而君至於爲君之尊而民至於爲民之卑君上日享其樂而臣下日安其勞而不敢怨者是法制之力也然猶未也可以禦小害而未可以禦大害也大盜起則城池險阻不可以固而留衆叛親離則法制不可以執而守是必有非􅄱之􅄱非勢之勢而後可也故至坎之六四而曰樽酒簋貳用􅇲納約自牖終無咎夫六四處剛柔相接之時而乃用一樽二簋土盎瓦􅇲相與拳曲俯仰於户牖之下而終獲无咎此豈非聖人知天下之不可以强服而爲是優柔從容之德以和其剛强難屈之心而作其愧耻不忍之意故耶嗟夫秦人自􅀒其强欲以斬刖齊天下之民而以山河爲社稷之保障不知英雄之士開而闢之􅆿罰不能繩險阻不能拒故聖人必有以深結天下之心使英雄之士有所不可􅄙者則坎之六四是也禮以養人爲本論君子之爲政權其輕重而審其小大不以輕害重不以小妨大爲天下之大善而小有不合焉者君子不顧也立天下之大善而以小有不合而止則是天下無聖人大善終不可得而建也自周之亾其父子君臣冠昬喪祭之禮皆以淪廢至於漢興賢君名臣比比而出皆知禮之足以爲治也然皆拱手相視而莫敢措非以禮爲不善也以爲不可復也是亦自輕而已故元成之間劉向上書以爲禮以養人爲本如有過差是過而養人也􅆿罰之過或至於死傷然有司請定法令筆則筆削則削是敢於殺人而不敢於養人也然而爲是者則亦有故律令起於後世而禮出於聖人敢變後世之􅆿而不敢變先王之禮是亦畏聖人太過之􅁦也記曰禮之所生生於義也故禮雖先王未之有可以義起也故因人之情而爲之節文則亦何至於憚之而不敢邪今夫冠禮所以養人之始而歸之正也昏禮所以養人之親而尊其祖也喪禮所以養人之孝而爲之節也祭禮所以養人之終而接之於無窮也賔客之禮所以養人之交而愼其瀆也鄉禮所以養人之本而教之以孝悌也凡此數者皆待禮而後可以生今皆廢而不立是以天下之人皇皇然無所折衷求其所從而不得則不能不出其私意以自斷其禮私意旣行故天下之弊起奢者極其奢以傷其生儉者極其儉以不得其所欲財用匱而饑寒作饑寒作而盜賊起盜賊起而民之所恃以爲養者皆失而不可得雖日開倉廩發府庫以贍百姓民猶未可得而養也故古之聖人不用財不施惠立禮於天下而匹夫匹婦莫不自得於閭閻之中而無所匱乏此所謂知本者也旣醉備五福論善夫詩人之爲詩也成王之時天下旣平其君子優柔和易而無所怨怒天下之民各樂其所年穀時􅌻父子兄弟相愛而無暴戾不和之節莫不相與作爲酒醴剝烹牛羊以享以祀以相與宴樂而不厭詩人欲歌其事而以爲未足以見其盛也故又推而上之至於朝廷之間見其君臣相安而親戚相愛至於祭祀宗廟旣事而又與其諸父昆弟皆宴於寢旅酬下至於無算爵君臣釋然而皆醉故爲作旣醉之詩以歌之而後之傳詩者又深思而極觀之以爲一篇之中而五福備焉然愚觀於詩書至抑與酒誥之篇觀其所以悲傷前世之失及其所以深懲切戒於後者莫不以飲酒無度沈湎􅂽亂號呶倨肆以敗亂其德爲首故曰百禍之所由生百福之所由消耗而不享者莫急於酒周公之戒康叔曰酒之失婦人是用二者合幷故五福不降而六極盡至愚請以小民之家而明之今夫養生之人深自覆護擁閉無戰鬭危亾之患然而常至於不壽者何耶是酒奪之也力田之人倉廩富矣俄而至於饑寒者何耶是酒困之也服食之人乳藥餌石無風雨暴露之苦而常至於不寧者何耶是酒病之也脩身之人帶鉤蹈矩不敢􅄭行而常至於失德者可耶是酒亂之也四者旣備則雖欲考終天命而其道無由也然而曰五福備於旣醉者何也愚固言之矣百姓相與歡樂於下而後君臣乃相與偕醉於上醉而愈恭和而有禮心和氣平無悖逆􅁀戾之氣干於其間而壽不可勝計也用財有節御己有度而富不可勝用也壽命長永而又加之以富則非安寧而何旣富而夀且身安矣而無所用其心則非好德而何富壽而安且有德以不朽於後也則非考終命而何故世之君子苟能觀旣醉之詩以和平其心而又觀夫抑與酒誥之篇以自戒也則五福可以坐致而六極可以逺却而孔子之說所以分而别之者又何足爲君子陳於前哉秘試論一首史官助賞罰論域中有三權曰天曰君曰史官聖人以此三權者制天下之是非而使之更相助夫惟天之權而後能壽夭禍福天下之人而使賢者無夭橫窮困之災不賢者無以享其富貴壽考之福然而季次原憲古所謂賢人者也伏於窮閻之下布衣饘粥之不給盜跖莊蹻橫行於天下食人之肝以爲糧而老死於牗下不見兵革之禍如此則是天之權有時而有所不及也故君人用其賞罰之權於天道所不及之間以助天爲治然而賞罰者又豈能盡天下之是非而賞罰之於一時猶懼其不能明著暴見於萬世之下故君舉而屬之於其臣而名之曰史官蓋史官之權與天與君之權均大抵三者更相助以無遺天下之是非故荀恱曰每於歲盡舉之尚書以助賞罰夫史官之興其來尚矣其最著者在周曰佚在魯曰克在齊曰南氏在晉曰董狐在楚曰􅀝相觀其爲人以度其當時之所書必有以助賞罰者然而不獲見其筆墨之所存以不能盡其助治之意獨仲尼因魯之史官左㐀明而得其載籍以作爲春秋是非二百四十二年雖其名爲經而其實史之尤大章明者也故齊􅁊晉文有功於王室王賞之以侯伯之爵征伐四􅀦之權而春秋又從而屢進之此所以助子賞之當於其功也吳楚徐越之僭皆得罪於其君者也而春秋又從而加之以斥絶擯棄不齒之辭此所以助乎罰之當於其罪也若夫當時賞罰之所不能及則又爲之明言其狀而使後世嗟嘆痛惜之不巳嗚呼賢人君子之功烈與夫亂臣賊子罪惡之狀於此皆可以無憂其無聞焉是故古者聖人重史官當漢之時號曰太史令而其權在丞相之上郡􅀦計吏上計於太史而後以其副上于丞相御史夫惟知其權之可以助賞罰也故從而尊顯之然則後之史官其可以忽哉省試論一首􅆿賞忠厚之至論古之君子立于天下非有求勝於斯民也爲􅆿以待天下之罪戾而唯恐民之入於其中以不能自出也爲賞以待天下之賢才而唯恐天下之無賢而其賞之無以加之也蓋以君子先天下而後有不得已焉夫不得巳者非吾君子之所志也民自爲而召之也故罪疑者從輕功疑者從重皆順天下之所欲從且夫以君臨民其强弱之勢上下之分非待夫與之爭尋常之是非而後能勝之矣故寧委之於利使之取其優而吾無求勝焉夫惟天下之罪惡暴著而不可掩别白而不可􅄙不得已而用其􅆿朝廷之無功鄉黨之無義不得巳而愛其賞如此然後知吾之用􅆿而非吾之好殺人也知吾之不賞而非吾之不欲富貴人也使夫其罪可以推而納之於􅆿其迹可以引而置之於無罪其功與之而至於可賞排之而至於不可賞若是二者而不以與民則天下將有以議我矣使天下而皆知其可􅆿與不可賞也則吾猶可以自􅄙使天下而知其可以無􅆿可以有賞之􅀃則將以我爲忍人而愛夫爵祿也聖人不然以爲天下之人不幸而有罪可以􅆿可以無􅆿􅆿之而傷於仁幸而有功可以賞可以無賞無賞而害於信與其不屈吾法孰若使民全其肌膚保其首領而無憾於其上與其名器之不僭孰若使民樂得爲善之利而無望望不足之意嗚呼知其有可以與之之道而不與是亦志於殘民而巳矣且彼君子之與之也豈徒曰與之而已也與之而遂因以勸之焉耳故捨有罪而從無罪者是以耻勸之也去輕賞而就重賞者是以義勸之也蓋欲其思而得之也故夫堯舜三代之盛捨此而忠厚之化亦無以見於民矣欒城應詔集第十一卷終
