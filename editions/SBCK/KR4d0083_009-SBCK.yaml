body:
  text: 進策五道民政上第一道臣聞王道之至於民也其亦深矣賢人君子自潔於上而民不免爲小人朝廷之間揖讓如禮而民不免爲盜賊禮行於上而淫僻邪放之心起於下而不能止此猶未免爲王道之未成也王道之本始於民之自喜而成於民之相愛而王者之所以求之其民者其粗始於力田而其精極於孝悌廉耻之際力田者民之最勞而孝悌廉耻者匹夫匹婦之所不悅强所最勞而使之有自喜之心勸所不恱而使之有相愛之意故夫王道之成而及其至於民其亦深矣古者天下之灾水旱相仍而上下不相保此其禍起於民之不自喜於力田天下之亂盜賊放恣兵革不息而民不樂業此其禍起於民之不相愛而棄其孝悌廉恥之節夫自喜則雖有太勞而其事不遷相愛則雖有强狠之心而顧其親戚之樂以不忍自棄於不義此二者王道之大權也方今天下之人狃於工商之利而不喜於農惟其最愚下之人自知其無能然後安於田畝而不去山林飢餓之民皆有盜跖趦趄之心而閨門之內父子交忿而不知反朝廷之上雖有賢人而其教不逮於下是故士大夫之間莫不以爲王道之遠而難成也然臣竊觀三代之遺文至於詩而以爲王道之成有所易而不難者夫人之不喜乎此是未得爲此之味也故聖人之爲詩道其耕耨播種之勞而述其歲終倉廩豐實婦子喜樂之際以感動其意故曰畟畟良耜俶載南畝播厥百穀實函斯活或來瞻汝載筐及筥其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼當此時也民旣勞矣故爲之言其室家來饁而慰勞之者以勉卒其業而其終章曰荼􅖋朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人當此之時歲功旣畢民之勞者得以與其婦子皆樂於此休息閒暇飲酒食肉以自快於一歲則夫勤者有以自忘其勤盡力者有以輕用其力而狼戾無親之人有所慕恱而自改其揉此非獨於詩云爾道之使獲其利而教之使知其樂亦如是云且民之性固安於所樂而恱於所利此臣所以爲王道之無難者也蓋臣聞之誘民之勢遠莫如近而近莫如其所與競今行之於朝廷之中而田野之民無遷善之心此豈非其遠而難至者哉明擇郡縣之吏而謹法律之禁􅆿者布市而頑民不悛夫鄕黨之民其視郡縣之吏自以爲非其比肩之人徒能畏其用法而袒背受笞於前不爲之愧此其勢可以及民之明罪而不可以及其隱匿此豈非其近而無所與競者邪惟其里巷親戚之間幼之所與同戲而壯之所以共事此則其所與競者也臣愚以爲古者郡縣有三老嗇夫今可使推擇民之孝悌無過力田不惰爲民之素所服者爲之無使治事而使譏誚教誨其民之怠惰而無良者而歲時伏臘郡縣頗置禮焉以風天下使慕恱其事使民皆有愧耻勉强不服之心今不從民之所競而教之而從其與所素畏夫其所素畏者彼不自以爲伍而何敢求望其萬一故教天下自所與競者始而王道可以漸至於下矣第二道臣聞三代之盛時天下之人自匹夫以上莫不務自脩潔以求爲君子父子相愛兄弟相恱孝悌忠信之美發於士大夫之間而下至於田畝朝夕從事終身而不厭至於戰􅀦王道衰息秦人驅其民而納之於耕耘戰鬭之中天下翕然而從之南畝之民而皆爭爲干戈旗鼓之事以首爭首以力搏力進則有死於戰退則有死於將其患無所不至夫周秦之間其相去不數十百年周之小民皆有好善之心而秦人獨喜於戰攻雖其死亡而不肯以自存此二者臣竊知其故也夫天下之人不能盡知禮義之美而亦不能奮不自顧以䧟於死傷之地其所以能至於此者其上之人實使之然也然而閭巷之民劫而從之則可以與之僥倖於一時之功而不可以望其久遠而周秦之風俗皆累世而不變此不可不察其術也葢周之制使天下之士孝悌忠信聞於鄕黨而逹於􅀦人者皆得以登於有司而秦之法使其武健壯勇能斬捕甲首者得以自復其役上者優之以爵祿而下者皆得役屬其鄰里天下之人知其利之所在則皆爭爲之而尚安知其他然周以之興而秦以之亡天下遂皆尤秦之不能而不知秦之所以使天下者亦無以異於周之所以使天下何者至便之勢所以奔走天下萬世之所不易也而特論其所以使之者何如焉耳今者天下之患實在於民昬而不知教然臣以爲其罪不在於民而上之所以使之者或未至也且天子所求於天下者何也天下之人在家欲得其孝而在􅀦欲得其忠弟兄欲其相與爲愛而朋友欲其相與爲信臨財欲其思廉而患難欲其思義此誠天子之所欲於天下者古之聖人所欲而遂求之來之以勢而使之自至是以天下爭爲其所求以求稱其意今有人使人爲之牧其牛羊將責之以其牛羊之肥則因其肥瘠而制其利害使夫牧者趨其所利從之則可以不勞而坐得其所欲今求之以牛羊之肥瘠而乃使之盡力於樵蘇之事以其薪之多少而制其賞罰之輕重則夫牧人將爲牧邪將爲樵邪爲樵則失牛羊之肥而爲牧則無以得賞故其人舉皆爲樵而無事於牧吾之所欲者牧也而反樵之爲得此無足怪也今夫天下之人所以求利於上者果安在哉士大夫爲聲病剽畧之文而治苟且記問之學曵裾束帶俯仰周旋而皆有意於天子之爵祿夫天子之所求於天下者豈在是也然天子之所以來之者唯此而人之所由以有得者亦惟此是以若此不可却也嗟夫欲求天下忠信孝悌之人而求之於一日之試天下尚誰知忠信孝悌之可喜而一日之試之可耻而不爲者詩云無言不醻無德不報臣以爲欲得其所求宜遂以其所欲而求之開之以利而作其怠則天下必有應者今間歲而一収天下之才竒人善士固宜有起而入於其中然天下之人不能深明天子之意而以爲所爲求之者止於其目之所見是以盡力於科舉而不知自反於仁義臣欲復古者孝悌之科使州縣得以與今之進士同舉而皆進使天下之人時獲孝悌忠信之利而明知天子之所欲如此則天下宜可漸化以副上之所求然臣非謂孝悌之科必多得天下之賢才而要以使天下知上意之所在而各趨於其利則庶乎其不待教而忠信之俗可以漸復此亦周秦之所以使人之術歟第三道臣聞聖人將有以奪之必有以予之將有以正之必有以柔之納之於正而無傷其心去其邪僻而無絶其不忍之意有所矯拂天下大變其俗而天下不知其爲其變也釋然而順油然而化無所齟齬而天下遂至於大正矣葢天下之民邪淫不法紛亂而至於不可吿語者非今世而然也夫古者三代之民耕田而後食其粟􅁞繅而後衣其帛欲享其利而勤其力欲獲其報而厚其施欲求其父子之親則盡心於􅄌孝之道欲求兄弟之和則致力於長悌之節欲求夫婦之相安朋友之相信亦莫不務其所以致之之術故民各治其生無望於僥倖之福而力行於可信之事凡其所以養生求福之道如此其精也至其不幸而死其親戚子弟又爲之死喪祭祀歲時伏臘之制所以報其先祖之恩而安卹孝子之意者甚具而有法籩豆簠簋飲食酒醴之薦大者於廟而小者於寢薦新時祭春秋不闕故民終三年之憂而又有終身不絶之恩愛􅃤然若其父祖之居於其前而享其報也至於後世則不然民怠於自脩而其所以養生求福之道皆歸於􅀑神㝠寞之間不知先王喪紀祭祀之禮而其所以追養其先祖之意皆入於佛老虚誕之􅀃是以四夷之教交於中􅀦縱橫放肆其尊貴富盛擬於王者而其徒黨遍於天下其宮室棟宇衣服飲食常侈於天下之民而中國之人明哲禮義之士亦未嘗以爲怪幸而其間有疑怪不信之心則又安視而不能去此其故何也彼能執天下養生報死之權而吾無以當之是以若此不可制也葢天下之君子嘗欲去之而亦旣去矣去之不久而還復其故其根之入於民者甚深而其道之恱於民者甚佞世之君子未有以􅄙其所以入而易其所以恱是以終不能服天下之意天下之民以爲養生報死皆出於此吾未有以易之而遂絕其教欲納之於正而傷其心欲去其邪僻而絶其不忍之意故民之從之也甚難聞之曰川竭而谷虛丘夷而淵實作乎此者必有以動乎彼也夫天下之民非有所恱乎佛老之道而恱乎養生報死之術今能使之得其所以恱之實而去其所恱之名則天下何病而不從葢先王之教民養生有方而報死有禮凡􅀦之賞罰黜陟各當其處貧富貴賤皆出於其人之所當然力田而多収畏法而無罪行立而名聲發德成而爵祿至天下之人皆知其所以獲福之因故無惑於􅀑神而其祭祀之禮所以仁其祖宗而慰其子孫之意者非有鹵莽不詳之意也故孝子慈孫有所歸心而無事於佛老臣愚以爲嚴賞罰勑官吏明好惡愼取予不赦有罪使佛老之福不得苟且而惑其生因天下之爵秩建宗廟嚴祭祀立尸祝有以塞人子之意使佛老之報不得乗隙而制其死葢漢唐之際嘗有行此者矣而佛老之􅀃未去嘗有去者矣而賞罰不詳祭祀不謹是以其道牢固而不可去旣去而復反其舊今者􅀦家幸而欲減損其徒日朘月削將至於亾然臣愚恐天下尚猶有不忍之心天下有不忍之心則其勢不可以久去故臣欲奪之而有以予之正之而有以柔之使天下無憾於見奪而日安其新此聖人所以變天下之術歟第四道臣聞管子治齊始變周法使兵民異處制􅀦爲二十一鄕工商之鄕六而士鄕十五制鄙以爲五屬立五大夫使各治一屬之政國中之士爲兵鄙野之民爲農農不知戰而士不知稼各治其事而食其力兵以衛農農以資兵發兵征行暴露戰鬭而農夫不知其勤深耕疾耨霑體塗足而士卒不知其勞當是之時􅁊公南征伐楚濟汝踰方城望汶山北伐山戎刜零支斬孤竹西攘白狄逾大行渡辟耳之溪九合諸侯築夷儀城楚丘徜徉四方􅀦無罷􅁦之民而天下諸侯徃來應接之不暇及秦孝公欲幷海內商君爲之唱謀使秦人莫不執兵以事戰伐而不得反顧而爲農隂誘六國之民使專力以耕關中之田而無戰攻守禦之役二者更相爲用而天下卒以不抗何者我能累累出兵不息而彼不能應我能外戰而內不乏食而彼必不戰而後食可足此二者管仲商鞅之深謀也自管仲死其遺謀舊策後世無復能用而獨其分兵與民之法遂至于今不廢何者其事誠有以便天下也今夫使農夫竭力以闢天下之地醵其所得以衣食天下之武士而免其􅂮亡戰鬭之患此人之情誰不可者然當今天下之事與管仲商鞅之時則已大異矣古者覇王在上倉廩豐實百姓富足地利已盡而民未之困當此之時謂之人有餘今天下之田疾耕不能徧而蓬蒿藜莠實盡其利人不得以爲食禽獸之所蕃息當此之時謂之地有餘古之聖人人有餘則務在於使人是以天下之人雖其甚蕃而舉無廢功地有餘則務在於闢地是以天下之地雖其甚寛而舉無遺力今也海內之田病於有餘而上之人務在於使人不已過哉臣觀京師之兵不下數十百萬㳂邊大郡不下數萬人天下郡縣千人爲輩而江淮漕運之卒不可勝計此亦巳侈於使人矣且夫人不足而使人之制不爲少減是謂狠天而違人昔齊􅁊之世人力可謂有餘矣而十五鄕之士不過三萬車不過八百乘何者懼不能久也方今天下之地所當厚兵之處不過京師與西邊北邊之郡耳昔太祖太宗旣平天下四方遠國或數千里以爲遠人險詖未可以盡知其情也故使關中之士往而屯焉以鎭服其亂心及天下旣安四海一家而因循久逺遂莫之變夫天下之兵莫如各居其鄕安其水土而習其險易而特病其不知戰故今世之患在不教鄕兵而專任屯戍之士爲賊之僃且天下治平非緣邊之郡則山林匹夫之盜及其未集而誅之可以無事於大兵苟其有大盜則其爲變故亦非戍兵數百千人之所能制若其要塞之地不可無僃之處乃當厚其土兵以代之耳聞之古者良將之用兵不求其多而求其樂戰今之爲兵之人夫豈皆樂乎爲兵哉或者饑饉困躓不能以自存而或者年少無賴旣入而不能以自脫蓋其間常有思歸者矣故臣欲罷其思歸之士以減屯戍之兵雖使去者太半臣以爲處者猶可以足於事也蓋古者有餘則使之以寛而不足則使之以約苟必待其有餘而後能辦天下之事則無爲貴智矣第五道臣聞近代以來天下之變備矣世之君子隨其破敗而爲之立法補苴缺漏疏剔棼穢其爲法亦已盡矣而後世之弊常不爲之少息其法旣立而旋亾其民暫享其利而不能久因循維持至於今世承百王之􅁦而獨受其責其病最爲繁多而古人巳行之遺策又莫不盡廢而不舉是以爲國百有餘年而不至於治平者由此之故也葢天下之多虞其始自井田之亡田制一敗而民事大壤紛紛而不可止其始也兼幷之民衆而貧民失職貧者無立錐之地而富者連阡陌以勢相役収太半之稅耕者窮餓而不耕者得食以爲不便故從而爲之法曰限民名田貴者無過若干而貧者足以自養此董生之法也天下之人兼幷而有餘則思以爲驕奢驕奢之風行於天下則冨者至於破其資畜而貧者耻於不若以爭爲盗而不知厭民皆有爲盜之心則爲之上者甚危而難安故爲之法曰立制而明等使多者不得過而少者無所慕也以平風俗此賈生之法也民之爲性豐年食之而無餘饑年則轉死溝壑而莫之救富商大賈乘其不足而貴賣之以重其災因其有餘而賤取之以待其􅁦予奪之柄歸於豪民而上不知収粒米狼戾而不爲斂藜藿不繼而不爲發故爲之法曰賤而官爲糴之以無傷農貴而官爲發之以無傷末小饑則發小熟之斂中饑則發中熟之斂大饑則發大熟之斂此李悝之法也古者三代之兵出而爲兵入而爲農出兵臨敵則􅀦有資糧之憂而兵罷役休則無復養兵之費及至後世海內多故而征伐不息以爲害農故特爲設兵以辦天下之武事其始若不傷農者而要其終衣食之奉農亦必受其困故爲之法曰不戰則耕以自養而耕之閑暇則習爲擊刺以待寇至此趙充􅀦之法也葢古之遺制其不可施於今者甚多而臣不敢復以爲􅀃而此四者皆天下之所共知而不行者也夫知之而不行此其故何歟臣聞事固有可以無術而行者有時異事變無術而不可行者均民以名田齊衆以立制是無術而可以􅀡行者也平糴以救災屯田以寛農是無術而不可行者也古者賢君在上用度足而財不竭􅂢其有餘以僃民之所不足而不害於歲計今者歲入不足以爲出􅀦之經費猶有所不給而何暇及於未然之備古者將嚴而兵易使其兵安於劬勞故雖使爲農而不敢亂今者天下之兵使之執勞者皆不知戰而可與戰者皆驕而不可使衣食豐溢而䈥力罷憊且其平居自處甚倨而安肯爲農夫之事屯田平糴之利舉世以爲不可復者由此之故也曷亦思其術矣臣嘗聞之賈人之治產也將欲有爲而無以爲資者不以其所以謀朝夕之利者爲之也葢取諸其不急之處而蓄之徐徐而爲之故其業不傷而事成夫天子之道食稅衣稅其餘之取於民者亦非其正矣茶鹽酒鐵之􅀋此近世之所設耳夫古之時未嘗有此四物者之用也而其爲􅀦亦無所乏絶臣愚以爲可於其中擇取一焉而置之用度之外歲以爲平糴之資且其旣巳置之用度之餘則不復有惜而發之也輕發之也輕而後民獲其利其與今之所謂常平者亦巳大異矣抑嘗聞之嘗巳牧馬者不可使之畜豚􅇾馬􅇾之相去未能幾也而猶且不可使今世之兵以兵募之而欲强之以爲農此其不從固無足怪者今欲以兵屯田蓋亦吿之以將屯田而募焉人固有無田以爲農而願耕者從其願而使之則雖勞而無怨苟屯田之兵旣多而可用則夫不耕而食者可因其死亾而勿復補以待其自衰矣嗟夫古之人其制天下之患其亦巳畧盡矣而其守法者常至於怠惰而不舉是以世之􅁦常若近起於今者而不求古之遺法而依之以爲治可不大悲矣哉欒城應詔集第九卷終
