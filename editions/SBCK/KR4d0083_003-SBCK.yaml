  text: 欒城應詔集第三卷
  hash: sha256:39ff81139730898e8f559648b262cd9ffde39d6f5f8dd8cd1031bcf8fb62e5ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0083_SBCK_003-1a}
body:
  text: 進論五首唐論天下之變常伏於其所偏重而不舉之處故內重則爲內憂外重則爲外患古者聚兵京師外無彊臣天下之事皆制於內當此之時謂之內重內重之􅁦奸臣內擅而外無所忌匹夫橫行於四海而莫之能禁其亂不起於左右之大臣則生於山林小民之英雄故夫天下之重不可使專在內也古者諸侯大􅀦或數百里兵足以戰食足以守而其權足以生殺然後能使四夷盜賊之患不至於內天子之大臣有所畏忌而內患不作當此之時謂之外重外重之弊諸侯擁兵而內無以制由此觀之則天下之重固不可使在外而亦不可使在內也自周之衰齊晉秦楚緜地千里內不勝於其外以至於滅亡而不救秦人患其外之巳重而至於此也於是収天下之兵而聚之關中夷滅其城池殺戮其豪傑使天下之命皆制於天子然至於二世之時陳勝吳廣大呼起兵而郡縣之吏熟視而走無敢誰何趙高擅權於內頤指如意雖李斯爲相僃五􅆿而死於道路其子李由守三川擁山河之固而不敢挍也此二患者皆始於外之不足而無有以制之也至於漢興懲秦􅀌立之􅁦乃大封侯王而高帝之世反者九起其遺孽餘烈至於文景而爲淮南濟北吳楚之亂於是武帝分裂諸侯以懲大國之禍而其後百年之間王莽遂得以奮其志於天下而劉氏子孫無復齟齬魏晉之世乃益侵削諸侯四方微弱不復爲亂而朝廷之權臣山林之匹夫常爲天下之大患此數君者其所以制其內外輕重之際皆有以自取其亂而莫之或知也夫天下之重在內則爲內憂在外則爲外患而秦漢之間不求其勢之本末而更相懲戒以就一偏之利故其禍循環無窮而不可􅄙也且夫天子之於天下非如婦人孺子之愛其所有也得天下而謹守之不忍以分於人此匹夫之所謂智也而不知其無成者未始不自不分始故夫聖人將有所大定於天下非外之有權臣不足以鎭之也而後世之君乃欲去其爪牙剪其股肱而責其成功亦已過矣愚嘗以爲天下之勢內無重則無以威外之彊臣外無重則無以服內之大臣而絕姦民之心此二者其勢相持而後成而不可一輕者也昔唐太宗旣平天下分四方之地盡以㳂邊爲節度府而范陽朔方之軍皆帶甲十萬上足以制夷狄之難下足以備匹夫之亂內足以禁大臣之變而其將率之臣常不至於叛者內有重兵之勢以預制之也正觀之際天下之兵八百餘府而在關中者五百舉天下之衆而後能當關中之半然朝廷之臣亦不至於乘間釁以邀大利者外有節度之權以破其心也故外之節度有周之諸侯外重之勢而易置從命得其擇其賢不肖之才是以人君無征伐之勞而天下無世臣㬥虐之患內之府兵有秦之關中內重之勢而左右謹飭莫敢爲不義之行是以上無逼奪之危而下無誅絕之禍蓋周之諸侯內無府兵之威故陷於逆亂而不能以自止秦之關中外無節度之援故脅於大臣而不能以自立有周秦之利而無周秦之害􅄱格勢禁內之不敢爲變而外之不敢爲亂未有如唐制之得者也而天下之士不究利害之本末猥以成敗之遺蹤而論計之得失徒見開元之後彊兵之將皆爲天下之大患而遂以太宗之制爲猖狂不審之計夫論天下論其勝敗之􅄱以定其法制之得失則不􅀂窮其所由勝敗之處蓋天寶之際府兵四出萃於范陽而德宗之世禁兵皆戍趙魏是以祿山朱泚得至於京師而莫之能禁一亂塗地終於昭宗而天下卒無寧歲內之彊臣雖有輔􅀦元振守澄士良之徒而卒不能制唐之命誅王涯殺賈餗自以爲威振四方然劉從諫爲之一言而震慴自斂不敢復肆其後崔昌遐􅀝朱溫之兵以誅宦官去天下之監軍而無一人敢與抗者由此觀之唐之衰其􅁦在於外重而外重之弊起於府兵之在外非所謂制之失而後世之不用也五代論昔者商周之興始於稷卨而至於湯武凡數百年之間而後得志於天下其成功甚難而享天下之利至緩也然桀紂旣滅収天下朝諸侯自處於天子之尊而下無不服之志誅一匹夫而天下遂定葢其用力亦甚易而無勞也至於秦漢之際其英雄豪傑之士逐天下之利唯恐不及而開天下之釁惟恐其後之也奮臂於大澤而天下之士雲合響應轉戰終日而辟地千里其取天下􅀂此其無難也然天下巳定君臣之分旣明分裂海內以王諸將將以傳之無窮百世而不變而數歲之間功臣大國反者如蝟毛而起是何其取之之易而守之之難也􅀂夫五代干戈之際其事雖不足道然觀其帝王起於匹夫鞭笞海內戰勝攻取而自梁以來不及百年天下五禪遠者不過數十年其智慮曾不足以及其後世此亦甚可怪也蓋嘗聞之梁之亡其父子兄弟自相屠滅虐用其民而天下叛周之亾適遭聖人之興而不能以自立此二者君子之所不疑於其間也而後唐之莊宗明宗與晉漢之高祖皆以英武特異之姿據天下太半之地及其子孫材力智勇亦皆有以過人者然終以敗亂而不可􅄙此其勢必有以自取之也蓋唐漢之亂始於功臣而􅀳之亂始於戎狄皆其以易取天下之過也莊宗之亂􅀳高祖以兵趨夷門而後天下定於明宗後唐之亡匈奴破張達之兵而後天下定於􅀳匈奴之禍周高祖發南征之議而後天下定於漢故唐滅於晉􅀳亂於匈奴而漢亾於周蓋功臣􅀒其創業之勲而匈奴恃其驅除之勞以要天子聽之則不可以久安而誅之則足以召天下之亂動一功臣天下遂並起而軋之矣故唐奪晉高祖之權而亾􅀳絕匈奴之和親而滅漢誅陽邠史肇而周人不服以及於禍彼其初無功臣無匈奴則不興而功臣匈奴卒起而滅之故古之聖人有可以取天下之資而不用有可以乗天下之勢而不顧撫循其民以待天下之自至此非以爲茍仁而巳矣誠以爲天下之不可以易取也欲求天下而求之於易故凡事之可以就天下者無所不爲也無所不爲而就天下天下旣安而不之改則非長久之計也改之而不顧此必有以忤天下之心者矣昔者晉獻公旣没公子重耳在翟里克殺奚齊卓子而召重耳重耳不敢入秦伯使公子縶往弔且吿以􅀳國之亂將有所立於公子重耳再拜而辭亦不敢當也至於夷吾聞召而起以汾陽之田百萬命里克以􅀒蔡之田七十萬命丕鄭而奉秦以河外列城五及其旣入而背內外之賂殺里克丕鄭而發兵以絶秦兵敗身虜不復其國而後文公徐起而収之大臣援之於內而秦楚推之於外旣反而霸於諸侯唯其不求入而人入之無賂於內外而其􅀔可以自入此所以反國而無後憂也其後劉季起於豐沛之間從天下武勇之士入關以誅暴秦降子嬰當此之時功􅃣諸侯其勢遂可以至於帝王此皆沛公之所自爲而諸將不與也然至追項籍於固陵兵敗而諸將不至乃捐數千里之地以與韓信彭越而此兩人卒􅀒其功背叛而不可制故夫取天下不可以僥倖於一時之利僥倖於一時之利則必將有百歲不巳之患此所謂不及遠也周公論伊尹旣立大甲不明而放諸桐天下不以爲不義武王旣沒成王幼周公攝天子之位朝諸侯於明堂而召公不􅀃管叔蔡叔咸叛天下幾至於不救二者此其故何也大甲旣立矣而不足以治天下則夫伊尹猶有以辭於後世也蓋周公之事其迹無以異於伊尹然天下之人舉皆疑而不信此無足怪也何者天下未知夫成王之不明而周公攝則是周公未有以服天下之心而彊攝焉以爲之上也且夫伊尹之攝其事則有所不得巳而然爾大甲雖廢而伊尹未敢有所復立以召天下之亂故寧以己攝焉而待夫大甲之悔是以天下無疑乎其心今夫周公之際其勢未至於不得巳也使成王拱手以居天下之上而周公爲之佐以成王之名號於天下而輔之以周公此所謂其勢之未至於不得巳者矣而周公不居則夫天下之謗周公之所自取也然愚以爲不然挾天子以令天下此諸葛孔明之事耳而周公豈不足以知之蓋夫人臣惟無執天子之權人臣而執天子之權則必有忠於其心而後可以自免於難何者人臣而用天子之事此天子之所忌也以一人之身上爲天子之所忌而下爲左右之大臣從而媒孽其短此古之忠臣所以盡心而不免於禍而世之奸雄之士所以動其無君之心而不顧者也使成王用事於天下而周公制其予奪之柄則愚恐成王有所不平於其心而管蔡之徒乘其隙而間之以至於亂也使成王有天子之虛名而不得制天下之政則愚恐周公有所不忍於其志赧然其有不安之心也是以寧取而攝之使成王無與乎其間以破天下讒慝之謀而絕其爭權之心是以其後雖有管蔡之憂而天下不摇使其當時立於羣臣之間方其危疑􅅰攘而未決也則愚恐周公之禍非居東之所能免而管蔡得志於天下成王將遂不立也嗚呼其思之遠哉老聃論上善與人言者因其人之言而爲之言則天下之爲辯者服矣與其里人言而曰吾父以爲不然則誰肯信以爲爾父之是是故不􅀂與之論其曲􅀡雖楚人可以與秦人言之而無害故夫天下之所爲多言以排夫異端而終以不明者唯不務其是非利害而以父屈人也夫聖人之所爲尊於天下爲其知夫理之所在也而周公仲尼之所爲信於天下以其弟子而知之也故非其弟子則天下有不知周公之爲周公而仲尼之爲仲尼者矣是故老聃莊周其爲說不可以周孔辯也何者彼且以爲周孔之不足信也夫聖人之於言譬如䂓矩之於方圓爾天下之人信規矩之於方圓而以規矩辯天下之不方不圓則不􅀂求其至方極圓以隂合於規矩使規而有不圓矩而有不方則亦無害於吾說􅀂此則其勢易以折天下之異論昔者天下之士其論老聃莊周與夫佛之道者皆未嘗得其要也老聃之說曰去仁義絕禮樂而後天下安而吾之說曰仁義禮樂天下之所待以治安者佛之說曰棄父絕子不爲夫婦放雞豚食菜茹而後萬物遂而吾之􅀃曰父子夫婦食雞豚以遂萬物之性夫彼且以其說而吾亦以吾􅀃彼之不吾信如吾之不彼信也蓋天下之不從莫急於未信而彊劫之故夫仁以安人而行之以義節之以禮而播之以樂守之以君臣而維之以父子兄弟食肉而飲酒此明於孔子者之所知也而欲以諭其所不知之人而曰孔子則然嗟夫難哉愚則不然曰天下之道唯其辯之而無窮攻之而無間辯之而有窮攻之而有間則是不足以爲道果孔子而有窮也亦將舎而他之惟其無窮是以知其爲道而無疑蓋天下有能平其心而觀焉而不牽夫仲尼老聃之名而後可與語此也老聃論下天下之道惟其辯之而無窮攻之而無間辯之而有窮攻之而有間則是不足以爲道昔者六􅀦之際處士橫議以熒惑天下楊氏爲我而墨氏兼愛凡天下之有以君臣父子之親而不相顧者舉皆歸於楊子而道路之人皆可以為父兄子弟者舉皆歸於墨子也夫天下之人不可以絕其相屬之親而合其無故之歡此其勢然矣故老聃莊周知夫天下之不從也而起而承之以爲兼愛爲我之不足以収天下是以不爲爲我不爲兼愛而處乎兼愛爲我之際此其意以爲不兼愛則天下議其無親不爲我則天下譏其爲人故兩無所適處而泛泛焉浮游其間而我皆無所與以爲是足以自免而逃天下之是非矣夫天下之人惟是其所是而非其所非是以其􅀃可得而考其終今夫老莊無所是非而其終歸於無有此其思之亦巳詳矣楊氏之爲我墨氏之兼愛此其爲道莫不有所執也故爲我者爲兼愛之所詆而兼愛者爲爲我之所毁是二者其地皆不可居也然而得其間而固守之則可以杜天下之異端而絶其口蓋古之聖人惟其得而居之是以天下大服而其道遂傳於後世今老聃莊周不得由其大道而見其隙竊入於其間而執其機是以其論縱橫堅固而不可破也且夫天下之事安可以一說治也彼二子者欲一之以兼愛斷之以爲我故其􅀃有時焉而遂窮夫惟聖人能處於其間而制其當然兼愛爲我亦莫棄也而能用之以無失乎道處天下之紛紜而不失其當故曰伯夷叔齊不降其志不辱其身而柳下惠少連降志而辱身言中倫行中慮虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可夫無可無不可此老聃莊周之所以爲辯也而仲尼亦云則夫老聃莊周其思之不可以爲不深矣蓋嘗聞之聖人之道處於可不可之際而遂從而實之是以其說萬變而不可窮老聃莊周從而虛之是以其􅀃汗澷而不可詰今將以求夫仲尼老聃之是非者惟能知虛實之可用與否而已矣蓋天下固有物也有物而物相遭則固亦有事矣是故聖人從其有而制其御有之道以治其有實之事則天下夫亦何一事之不可爲而區區焉平其有以納之於無則其用力不巳甚勞矣哉夫老聃莊周則亦嘗自知其窮矣夫其窮者何也不􅀂從其有而有之之爲易也故曰常無欲以觀其妙而又曰常有欲以觀其徼旣曰無之以爲用而又曰有之以爲利而至於佛者則亦曰斷滅而又曰無斷無滅夫旣曰無矣而又恐無之反以爲窮旣曰斷滅矣而又恐斷滅之適以爲累則夫其情可以見矣仲尼有言曰君子之中庸也君子而時中小人之中庸也小人而無忌憚也夫老聃莊周其亦近於中庸而無忌憚者哉欒城應詔集第三卷終
