  text: 欒城應詔集第六卷
  hash: sha256:cdee9eece44bbaaea8808e1e5b3819216c10c8fd99496a4d6b4745fa98ae9009
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0083_SBCK_006-1a}
body:
  text: 進策五道君術第一道臣聞天下之事非宰相不可盡行非諫官不可盡言天下之人誰能必至於諫官宰相者惟其少而學之長而欲行之終其身而不當其位不可以侵官而求盡其意是故士大夫之間猶有不能自盡其才於天子者也今臣幸而生於天下無事之時每一間歲天子常詔兩制之大臣使舉天下之士上自登朝之吏而下至於山林之匹夫咸得竭其所懷以盡天下之利害非天子出納耳目之官而得以言萬民之情僞非天子黜陟賞罰之臣而得以論百官之長短非天子武力將帥之士而得以議兵革之彊弱非天子錢穀大農之吏而得以􅅦財用之多少蓋天下之人必其爲宰相諫官而後可以盡行而盡言者使之一旦得以詳數而悉􅀃之此有以見天子之意所以待之者甚重而不輕也而臣何敢以無􅀃而處於此臣常以爲天下之事雖其甚大而難辦者天下必有能辦之人蓋當今之所爲大患者不過曰四夷彊盛而兵革不振百姓凋􅁦而官吏不飭重賦厚斂而用度不足嚴法峻􅆿而姦軌不止此數四者所以使天子坐不安席中夜太息而不寐者也然臣皆以爲不足憂何者天下必有能爲天子出力而爲之者而臣之所憂在乎天下之所不能如之何者也臣聞善治天下者必明於天下之情而後得御天下之術術者所謂道也得其道而以智加焉是故謂之術古之聖人惟其知天下之情而以術制之也萬物皆可得而役其生皆可得而制其死牛服於箱馬服於轅鷹隼服於韝牛不可以有所觸馬不可以有所踶鷹隼不可以背而高翔此三者惟其喜怒好惡之情發於外而見於人也是以因其所忌而授之以其術至於終身制於人而不去且治天下何異於治馬也馬之性剛很而難制急之則􅁦而不勝緩之則惰而不趨王良造父爲之先後而制其遲速驅之有方而掣之有時則終日而不知止此術之至也古之聖人驅天下之人而盡用之仁者使効其仁勇者使効其勇智者使効其智力者使効其力天下之人雖襍然皆列於前安得仁人君子而後任之且雖有天下之善人與之處而不知其情御之而不中其病則雖有好善之心而不獲好善之利何者彼不徒爲吾用也而況乎天下之英雄欲収其功而不制其心哉昔者秦漢之際姦宄猛悍之人所在而爲宼高祖發於豐沛之間行而収之黥布彭越之倫皆撫而納諸其中所以制之者甚僃也玉帛子女牛羊犬馬以極其豪侈之心輕財好施敦厚長者以服其趦趄之懷倨肆傲岸輕侮凌辱以折其强很之氣其視天下之英雄不啻􅀂匹夫孺子然皆得其歡心而用其死力至於元成之世天下久於太平士大夫生於其間無復英雄難制之風天下之士皆書生好儒其才氣勇力無足畏者俛首下氣求爲之用而不暇元成哀平亦欲得天下之賢才而用之然而不知其情不獲其術賢人君子避讒畏譏遠引而去而小人宦豎縱横放肆而制其事此甚可憫也夫人之平居朋友之間僕妾之際莫不有術以制其變蓋非有湥遠難見之事也欲其用命而見其所害欲其樂從而見其所利欲其喜而致其所恱欲其懼而致其所忌欲其開心見誠而示之以無所恐欲其守死不去而示之以無所往此天下之人皆能知之而至於治天下則不能用且此過矣天下以爲天子之尊無所事術也而不知天下之事惟其英雄而後能有大功而世之英雄常苦豪橫太過而難制由此觀之治天下愈不可以無術也第二道臣聞將求御天下之術必先明於天下之情不先明於天下之情則與無術何異夫天下之術臣固巳畧言之矣而又將竊言其情今使天子皆得賢人而任之雖可以無憂乎其爲姦然猶有情焉而不可以不知蓋臣聞之人有好爲名高者臨財推之以讓其親見位去之以讓其下進而天子禮焉則以爲歡而不禮焉則雖逼之而不食其祿力爲亷恥之節以高天下􅀂是而天子不知焉而豢之以厚利則其心􅎼然有所不平人有好爲厚利者見祿而就之以優其身見利而取之以豐其家良田大屋惟其與之則可以致其才如是而天子不知焉而强之以名高則其心缺然有所不悅於其中人惟無好自勝也好自勝而不少柔之則忿鬭而不和人惟無所相惡也有所相惡而不爲少避之則事其私怒而不求成功素剛則無折之也素畏則無强之也强之則將不勝而折之則將不振凡此數者皆所以求用其才而不傷其心也然猶非所以制天下之姦雄蓋臣聞之天下之姦雄其爲心也甚深而其爲迹也甚微將營其東而􅄱之於西將取其右而擊之於左古之人有欲得其君之權者不求之其君也優游翺翔而聽其君之所欲爲使之得其所欲而油然自放以釋天下之權天下之權旣去其君而無所歸然後徐起而収之故能取其權而其君不之知古之人有爲之者李林甫是也夫人之旣獲此權也則思專而有之故常恐其下之人從而傾焉夫人惟能自固其身而後可以謀人自固之不暇而欲謀人也實難故古之權臣常合天下之爭天下且相與爭而不􅄙則其勢無暇及我是故可以久居而不去古之人有爲之者亦李林甫是也世之人君茍無好善之心幸而有好善之心則天下之小人皆將賣之以爲姦何者有好善之名而不察其善之實天下之善固有可以謂之惡而天下之惡固有可以謂之善者彼知吾之欲爲善也則或先之以善而終之以惡或有指天下之惡而飾之以善古之人有爲之者石顯是也人之將欲爲此釁也將欲建此事也必先得於其君欲成事而君有所不恱則事不可以成故古之姦雄刼之以其所必不能其所必不能者不可爲也則將反而從吾之所欲爲古之人有爲之者驪姬之說獻公使之說而避禍是也此數者天下之至情故聖人見其初而求其終聞其聲而推其􅄱蓋惟能察人於無故之中故天下莫能欺何者無故者必有其故也古者明王在上天下之小人伏而不見夫小人者豈其能無意於天下也舉而見其情發而中其病是以愧恥退縮而不敢進臣欲天子明知君子之情以養當世之賢公名􅀸而深察小人之病以絕其自進之漸此亦天下之至明也第三道臣聞天子之道可以理得而不可以名推其於天下不取其􅄱而獨取其意其道可以爲善而亦可以爲不善何者其道無常其道無常者不善之所從生也夫天下之人惟知不忍殺人之爲仁也是故不忍殺人以自取不仁之名惟知果於殺人之爲義也是故不敢不殺以自取不義之名是二者其所以爲仁者有􅄱而其所以爲義者有狀其進也有所執其規而其退也有所蹈其矩故其爲人也不失爲天下之善人而終不至於君子有所甚而不堪有所蔽而不見此其爲人是自全之人也今夫君子有所殺人以爲仁而有所不殺以爲義義不在於殺人而仁不在於不殺其進也無所據依而其退也無所底厲故其成也天下將皆安之而其不成也將使天下至於大亂是以天下惡其難明而畏其難就人臣以是戒其君而人君者亦以自戒曰姑爲無殺人以爲仁而姑爲果於殺人以爲義是其仁可以全身而其義可以無􅉪於天下斯足以爲無過也巳矣孟子有言曰責難於君謂之恭陳善閉邪謂之有禮而謂吾君不能者謂之賊且夫爲人臣而詔其君不曰必爲大人之仁義而曰姑爲其易者以苟避天下之謗此非恐其君不能之故歟蓋臣聞之聖人之道惟其不可以名稱而迹求者其爲道也甚深而難成而其成也亦不􅀂小道之淺而無功所御甚廣而所處甚約握之甚微而播之無極故孔子曰吾非多學而識之吾一以貫之夫一者何也知天下萬物之理而制其所當處是謂一矣而能得吾一者甚難故夫天下之畏之者亦不足怪也古之聖人已能知之則行之而無疑己不能知之則不敢以己之私意而破天下之公義使己而不好殺人則安可盡無殺以成仁之􅄱使己而好殺人則安可盡殺以成義之狀蓋必有大臣救其已甚而補其不足使義不在於殺人而仁不在於不殺方今天下之治所不足者非仁也吏聞有以入人之罪抵重罰而未聞有以失人之罪抵深法者民聞有以赦除其罪而未聞有以不義得罪於法之外者此亦足以見天子之用心矣古者君臣之間和而不同上有寛厚之君則下有守法之臣上有急切之君則下有推恩之臣凡以交濟其所不足而彌縫其闕今也君臣之風上下如一而無以相濟是以天下苦於寬緩怠惰而不能自振此豈左右之大臣務以順從上意爲恱而豈亦天子自信以爲好仁之美而不喜臣下之有所矯拂哉方今之制易於行賞而重於用罰天下之以獄上者凡與死比則皆蹙頞而不悅此其爲意夫豈不善然天下之姦人無以深懲而切戒之者此無乃爲仁而至於不仁歟臣愚以爲輔君之善而補其不足此誠大臣之事茍天子自信以爲善欲以一人之私好而破天下之公義則夫大臣者猶不可爲也惟知天子之仁義而無務其迹以成匹夫之節使大臣得參於其間而救其所短此不亦近於天子之道歟第四道臣聞古者君臣之間相信如父子相愛如兄弟朝廷之中優游恱懌歡然相得而無間知無所不言言無所不盡開心平意表裏洞達終身而不見其隙當此之時天下之人出身以事君委命於上而無所憂懼安神定氣以觀天下之政蕩然肆志有所欲爲而上不見忌其所據者甚堅而無疑是以士大夫皆敢進而搏天下之大功至於後世君臣相虞皆有猜防之憂君不敢以其誠心致諸其臣而臣亦不敢􅀡己以行事二者相與齟齬而不相信上下相顧鰓鰓然而不能以自安而尚何暇及於天下之利害故天下之事每每擾敗而無所成就臣竊傷之而以爲其蔽在於防禁之太深而督責之太急夫古之聖人至嚴而有所至寛至易而有所至險使天下有所易信而有所不可測用之各當其處而不失節是以天下畏其嚴而樂其寛至於後世之君徒知天下之不可以甚寛也而用之其君臣之際使其公􅀸大臣終日憂懼不得安意肆志以自盡於其上而以爲畏威徒知天下之不可甚嚴也而用之其法律之事使其天下之官吏欺其長上得以茍免取容不畏天子之法而以爲行惠葢其所以用之之術甚悖而不順者至於如此夫天下之人上自百官而下至於庶民其爲數安可窮盡而天子者以其一身􅀉乎其中論其衆寡之勢則天下至衆而天子至寡論其智詐巧僞之術則天下之衆固必有過於天子者吾欲臨之以天子之威則彼有畏憚而不敢言多爲之隄防以御其變詐則彼之智將有以出於堤防之所不能及是以古之聖人推之以至誠而御之以至威容之以至寛而待之以至易以君子長者之心待天下之士而不防其爲詐談笑議論無所不及以開其歡心故天下士大夫皆欣然而入於其中有所愧耻而不忍爲欺詐之行力行果斷而無憂懼不敢之意其所任用雖其兄弟朋友之親而不顧徇私之名其所誅􅓍雖其讎怨睚眦之人而不卹報怨之嫌何者君臣相信之篤此所謂至嚴而有所至寛者也然至大吏縱橫放肆犯法而無所忌天下之所指目律令之所當取則雖天子有所不可輒釋使之一入而不可􅄙而後天下知有所畏此所謂至易而有所至險二者其事不同而相與爲用夫是以至寛而天下無頽惰靡迆之風至險而君臣無猜防逼迫之慮夫惟能通其君臣之歡而盡行其􅆿法之所禁而後可以及此也第五道臣聞事有􅀂緩而其變甚急者天下之勢是也天下之人幼而習之長而成之相咻而成風相比而成俗縱横顚倒紛紛而不知以自定當此之時其上之人􅆿之則懼驅之則聽其勢􅀂無能爲者然及其爲變常至於破壞而不可禦故夫天子者觀天下之􅀔而制其所向以定其所歸者也夫天下之人弛而縱之拱手而視其所爲則其勢無所不至其狀如長江大河日夜渾渾趨於下而不能止抵曲則激激而無所􅂥則咆㪍潰亂蕩然而四出壊堤防包陵谷汗漫而無所制故善治水者因其所入而導之則其勢不至於激怒坌涌而不可収旣激矣又能徐徐而􅂥之則其勢不至於破決蕩溢而不可止然天下之人常狎其安流無事之不足畏也而不爲去其所激觀其激作相蹙潰亂未發之際而以爲不至於大懼不能徐􅂥其怒是以遂至横流於中原而不可卒治昔者天下旣安其人皆欲安坐而守之循循以爲敦厚黙黙以爲忠信忠臣義士之氣憤悶而不得發豪俊之士不忍其鬱鬱之心起而振之而世之士大夫好勇而輕進喜氣而不懾者皆樂從而羣和之􅀡言忤世而不顧􅀡行犯上而不忌今之君子累累而從事於此矣然天下猶有所不從其餘風故俗猶衆而未去相與抗拒而勝􅀒之數未有所定邪正相搏曲􅀡相犯二者潰潰而不知其所終極蓋天下之勢巳小激矣而上之人不從而遂決其壅臣恐天下之賢人不勝其忿而自決之也夫惟天子之尊有所欲爲而天下從之今不爲決之於上而聽其自決則天下之不同者將悻然而不服而天下之豪俊亦將奮踴不顧而決之發而不中故大者傷小者死橫潰而可可救譬如東漢之士李膺杜密范滂張儉之黨慷􅁣議論本欲矯拂世俗之弊而當時之君不爲分别天下之邪正以快其氣而使天下之士發憤以自決之而天下遂以大亂由此觀之則夫英雄之士不可以不少遂其意也是以治水者唯能使之日夜流注而不息則雖有蛟龍鯨鯢之患亦將順流奔走奮迅悅豫而不暇及於爲變茍其瀦畜渾亂壅閉而不決則水之百怪皆將勃然放肆求以自快其意而不可禦故夫天下亦不可不爲少決以順適其意也欒城應詔集第六卷終
